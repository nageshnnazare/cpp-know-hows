<hr />
<h2 id="81-rules-what-can-and-cannot-be-overloaded">8.1 Rules: what can and cannot be overloaded</h2>
<pre><code>   OVERLOADABLE (38 operators):
     + - * / % ^ &amp; | ~ ! = &lt; &gt; += -= *= /= %= ^= &amp;= |=
     &lt;&lt; &gt;&gt; &gt;&gt;= &lt;&lt;= == != &lt;= &gt;= &lt;=&gt; &amp;&amp; || ++ -- , -&gt;* -&gt;
     ( ) [ ] new new[] delete delete[] co_await

   NOT OVERLOADABLE:
     ::   (scope resolution)        .    (member access)
     .*   (pointer-to-member)       ?:   (conditional)
     sizeof   alignof   typeid      noexcept   (and the preprocessor # ##)
</code></pre>
<p>Hard constraints (all enforced by the compiler):</p>
<ol>
<li>You cannot create <strong>new</strong> operator tokens (no <code>**</code>, no <code>&lt;&gt;</code>).</li>
<li>
<p>You cannot change an operator&rsquo;s <strong>arity</strong>, <strong>precedence</strong>, or <strong>associativity</strong>
   (Module 01, §1.7). <code>a + b * c</code> always groups as <code>a + (b * c)</code> regardless of types.</p>
</li>
<li>
<p>At least one operand must be a <strong>user-defined type</strong> (class or enumeration). You
   cannot redefine <code>int + int</code>. (Enumerations count — you <em>can</em> overload <code>operator|</code>
   for a scoped enum.)</p>
</li>
<li>
<p>The operators <code>=</code>, <code>[]</code>, <code>()</code>, <code>-&gt;</code>, and the conversion operators must be
   <strong>non-static member functions</strong> (C++23 relaxes <code>[]</code> and <code>()</code> to allow <code>static</code>).</p>
</li>
<li>
<p><code>new</code>/<code>delete</code> are special (they&rsquo;re really allocation functions, §8.15).</p>
</li>
<li>
<p>Overloading <code>&amp;&amp;</code>, <code>||</code>, <code>,</code> <strong>silently removes</strong> their built-in short-circuit /
   sequencing guarantees (§8.9) — avoid.</p>
</li>
<li>
<p>Default arguments are <strong>not allowed</strong> on overloaded operators (except <code>()</code>).</p>
</li>
</ol>
<hr />
<h2 id="82-member-vs-non-member--the-decision-rules">8.2 Member vs non-member — the decision rules</h2>
<pre><code>   a @ b   where @ is a binary operator and 'a' has type A:
     • if @ is a MEMBER of A:        a.operator@(b)      ← left operand is 'this', NOT convertible
     • if @ is a NON-MEMBER:         operator@(a, b)     ← BOTH operands can convert

   Consequence: symmetric operators where the LEFT operand might need a conversion
   (e.g. 2 + money) MUST be non-member, or the conversion can't apply to the left side.
</code></pre>
<p>Canonical placement (the &ldquo;C++ operator etiquette&rdquo;):</p>
<table>
<thead>
<tr>
<th>Operator(s)</th>
<th>Placement</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>= [] () -&gt; -&gt;* operator T()</code></td>
<td><strong>member (required)</strong></td>
<td>language rule</td>
</tr>
<tr>
<td><code>+= -= *= ...</code> (compound assign)</td>
<td><strong>member</strong></td>
<td>mutates left operand (<code>this</code>)</td>
</tr>
<tr>
<td><code>++ --</code></td>
<td><strong>member</strong></td>
<td>mutates <code>this</code></td>
</tr>
<tr>
<td>unary <code>- + ! ~ *</code> (deref)</td>
<td><strong>member</strong></td>
<td>acts on <code>this</code></td>
</tr>
<tr>
<td>binary <code>+ - * / % &amp; \\| ^ &lt;&lt; &gt;&gt;</code></td>
<td><strong>non-member (friend)</strong></td>
<td>symmetric; allows conversion on both sides</td>
</tr>
<tr>
<td><code>== != &lt; &lt;= &gt; &gt;= &lt;=&gt;</code></td>
<td>non-member or member</td>
<td>symmetric; member is fine in C++20 (rewrites cover both sides for class types)</td>
</tr>
<tr>
<td><code>&lt;&lt; &gt;&gt;</code> (streams)</td>
<td><strong>non-member</strong></td>
<td>left operand is the stream, not your type</td>
</tr>
</tbody>
</table>
<p>🧠 The professional idiom: implement the mutating member (<code>operator+=</code>), then define
the binary operator as a non-member in terms of it (<code>operator+</code> calls <code>+=</code>). This
gives correct conversions, less code, and consistency.</p>
<hr />
<h2 id="83-assignment-operator-">8.3 Assignment operator <code>=</code></h2>
<p><code>operator=</code> <strong>must be a non-static member</strong>. The compiler-generated forms are
<em>special members</em> (Module 05/06). User forms:</p>
<pre><code class="language-cpp">class T {
public:
    // copy assignment — canonical signatures (pick ONE form):
    T&amp; operator=(const T&amp; rhs);            // most common
    T&amp; operator=(T rhs);                   // copy-and-swap (by value) — handles copy &amp; move
    T&amp; operator=(T&amp; rhs);                  // legal but unusual (can't bind const/temporaries)
    const T&amp; operator=(const T&amp;);          // legal but discouraged (breaks (a=b)=c chaining)

    // move assignment:
    T&amp; operator=(T&amp;&amp; rhs) noexcept;

    // C++11 control:
    T&amp; operator=(const T&amp;) = default;      // request implicit
    T&amp; operator=(const T&amp;) = delete;       // forbid copy assignment

    // ref-qualified (C++11): restrict which value categories may be assigned TO
    T&amp; operator=(const T&amp;) &amp;;              // only assignable to an LVALUE: a = b ok; f() = b error
    T&amp; operator=(const T&amp;) &amp;&amp; = delete;    // forbid assigning to a temporary

    // templated assignment (NOT a special member; coexists with the real one):
    template&lt;class U&gt; T&amp; operator=(const U&amp; other);
};
</code></pre>
<pre><code>   RETURN TYPE:  return T&amp; (reference to *this) to allow chaining: a = b = c;
   SELF-ASSIGN:  guard against a = a (copy-and-swap does this for free).
   STRONG GUARANTEE: copy-and-swap gives commit-or-rollback (Module 13).
</code></pre>
<p>🧠 <strong>Ref-qualifiers on <code>operator=</code></strong> stop nonsense like <code>std::string{} = "x";</code> or
<code>(a + b) = c;</code>. The standard containers are <em>not</em> ref-qualified for backward
compatibility, but for new value types, <code>T&amp; operator=(...) &amp;;</code> is good hygiene.</p>
<p>Full details of copy/move/defaulted/deleted assignment are in <a href="06_copy_move_semantics.md">Module 06</a> and the <a href="#section-cross-ref">special-members reference</a>.</p>
<hr />
<h2 id="84-compound-assignment-operators">8.4 Compound assignment operators</h2>
<p><code>+= -= *= /= %= &amp;= |= ^= &lt;&lt;= &gt;&gt;=</code>. <strong>Members</strong>, return <code>T&amp;</code> to <code>*this</code>.</p>
<pre><code class="language-cpp">class Vec {
    double x_, y_;
public:
    Vec&amp; operator+=(const Vec&amp; r) { x_+=r.x_; y_+=r.y_; return *this; }
    Vec&amp; operator-=(const Vec&amp; r) { x_-=r.x_; y_-=r.y_; return *this; }
    Vec&amp; operator*=(double s)     { x_*=s;    y_*=s;    return *this; }
    Vec&amp; operator/=(double s)     { x_/=s;    y_/=s;    return *this; }
    // bitwise compound (for integer-like types):
    // T&amp; operator&amp;=(const T&amp;); T&amp; operator|=(const T&amp;); T&amp; operator^=(const T&amp;);
    // T&amp; operator&lt;&lt;=(int);     T&amp; operator&gt;&gt;=(int);
};
</code></pre>
<pre><code>   SIGNATURE PATTERN (member):   T&amp; operator?=(const Rhs&amp; rhs);
   RETURN:                       T&amp;  (reference to *this) — enables (a += b) += c
   NOTE:                         these are the &quot;primary&quot; mutating ops; build the
                                 binary versions (§8.5) on top of them.
</code></pre>
<hr />
<h2 id="85-binary-arithmetic--bitwise-operators">8.5 Binary arithmetic &amp; bitwise operators</h2>
<p><code>+ - * / %</code> and <code>&amp; | ^ &lt;&lt; &gt;&gt;</code>. <strong>Non-member (friend)</strong>, return <strong>by value</strong>,
take the first argument <strong>by value</strong> to enable RVO and reuse the compound op.</p>
<pre><code class="language-cpp">class Vec {
    double x_, y_;
public:
    Vec(double x, double y) : x_(x), y_(y) {}
    Vec&amp; operator+=(const Vec&amp;);
    friend Vec operator+(Vec a, const Vec&amp; b) { a += b; return a; }   // a is a local copy
    friend Vec operator-(Vec a, const Vec&amp; b) { a -= b; return a; }
    friend Vec operator*(Vec a, double s)     { a *= s; return a; }
    friend Vec operator*(double s, Vec a)     { a *= s; return a; }   // 2.0 * v — symmetric!
};
</code></pre>
<pre><code>   SIGNATURE PATTERNS:
     non-member (preferred): T  operator+(const T&amp; a, const T&amp; b);
                             T  operator+(T a, const T&amp; b);        // by-value 1st arg + reuse +=
     member (allowed):       T  T::operator+(const T&amp; rhs) const;  // but blocks lhs conversion
   RETURN:                    BY VALUE (a new object) — these don't modify operands.
   MIXED TYPES:               provide BOTH (T,U) and (U,T) overloads for symmetry,
                              OR rely on a converting constructor + non-member form.
</code></pre>
<p>⚠️ A <strong>member</strong> <code>operator+</code> makes <code>2.0 * v</code> fail to compile (no implicit conversion
on the <code>this</code> operand). Non-member + a converting ctor makes both <code>v * 2.0</code> and
<code>2.0 * v</code> work. This is the single most important reason to prefer free functions
for symmetric binary operators.</p>
<hr />
<h2 id="86-unary-operators-------and-">8.6 Unary operators <code>+ - ! ~ *</code> (and <code>&amp;</code>)</h2>
<p><strong>Members</strong>, take no arguments (the operand is <code>this</code>).</p>
<pre><code class="language-cpp">class Big {
public:
    Big  operator-() const;     // unary minus (negation): return -*this by value
    Big  operator+() const;     // unary plus  (usually identity / promotion)
    bool operator!() const;     // logical NOT (legacy; prefer explicit operator bool)
    Big  operator~() const;     // bitwise NOT
    // unary * and &amp; are dereference / address-of — see §8.13
};
</code></pre>
<pre><code>   SIGNATURE PATTERN (member):   ReturnType operator?() const;   // no parameters
   AS NON-MEMBER (rare):         ReturnType operator?(const T&amp; operand);
   unary minus returns BY VALUE; do NOT modify *this.
</code></pre>
<p>⚠️ Overloading unary <code>operator&amp;</code> (address-of) breaks generic code that takes
addresses (<code>std::addressof</code> exists precisely to bypass such abuse). Don&rsquo;t.</p>
<hr />
<h2 id="87-increment--decrement----">8.7 Increment &amp; decrement <code>++ --</code></h2>
<p>The <strong>dummy <code>int</code> parameter</strong> distinguishes postfix from prefix.</p>
<pre><code class="language-cpp">class Iter {
    T* p_;
public:
    Iter&amp; operator++()    { ++p_; return *this; }                 // PREFIX: ++it  → returns ref
    Iter  operator++(int) { Iter tmp = *this; ++*this; return tmp; } // POSTFIX: it++ → returns OLD value
    Iter&amp; operator--()    { --p_; return *this; }                 // prefix --
    Iter  operator--(int) { Iter tmp = *this; --*this; return tmp; } // postfix --
};
</code></pre>
<pre><code>   PREFIX  (++x):  T&amp; operator++();         increment, return *this BY REFERENCE (cheap)
   POSTFIX (x++):  T  operator++(int);      copy old, increment, return OLD value BY VALUE
                          ▲
                          └── unnamed dummy 'int' parameter — the ONLY way to tell them apart
   As non-member:  T&amp; operator++(T&amp;);  and  T operator++(T&amp;, int);
</code></pre>
<p>🧠 Always implement postfix in terms of prefix. Prefer <code>++it</code> in your own code —
postfix forces a copy of the old state.</p>
<hr />
<h2 id="88-comparison-operators--and-c20-rewrites">8.8 Comparison operators <code>&lt;=&gt;</code> and C++20 rewrites</h2>
<p>This is the area most transformed by C++20. <strong>Understand the rewrite machinery.</strong></p>
<h3 id="pre-c20-six-separate-operators">Pre-C++20: six separate operators</h3>
<pre><code class="language-cpp">class V {
    int a_, b_;
public:
    // member form (one operand convertible) OR non-member friend (both convertible)
    friend bool operator==(const V&amp; x, const V&amp; y){ return x.a_==y.a_ &amp;&amp; x.b_==y.b_; }
    friend bool operator!=(const V&amp; x, const V&amp; y){ return !(x==y); }
    friend bool operator&lt; (const V&amp; x, const V&amp; y){ return x.a_&lt;y.a_ || (x.a_==y.a_ &amp;&amp; x.b_&lt;y.b_); }
    friend bool operator&gt; (const V&amp; x, const V&amp; y){ return y&lt;x; }
    friend bool operator&lt;=(const V&amp; x, const V&amp; y){ return !(y&lt;x); }
    friend bool operator&gt;=(const V&amp; x, const V&amp; y){ return !(x&lt;y); }
};
</code></pre>
<h3 id="c20-one-or-two-operators--automatic-rewrites-">C++20: one (or two) operators + automatic rewrites 🧠</h3>
<pre><code class="language-cpp">#include &lt;compare&gt;
struct V {
    int a_, b_;
    auto operator&lt;=&gt;(const V&amp;) const = default;   // memberwise lexicographic ordering
    // a defaulted &lt;=&gt; ALSO implicitly provides a defaulted operator==
};
</code></pre>
<pre><code>   THE REWRITE RULES (how the compiler synthesizes comparisons):
   ┌─────────────────────────────────────────────────────────────────────────┐
   │ a == b  → uses operator==              ; a != b → !(a == b)             │
   │ a &lt;  b  → (a &lt;=&gt; b) &lt;  0   ; a &gt;  b → (a &lt;=&gt; b) &gt;  0                    │
   │ a &lt;= b  → (a &lt;=&gt; b) &lt;= 0   ; a &gt;= b → (a &lt;=&gt; b) &gt;= 0                    │
   │ The compiler also tries REVERSED operands: if a==b isn't found,         │
   │   it tries b==a; if a&lt;b via &lt;=&gt; isn't found, it tries 0 &lt; (b &lt;=&gt; a).    │
   └─────────────────────────────────────────────────────────────────────────┘
   ⇒ Define operator&lt;=&gt; (ordering) and operator== (equality) — get all SIX, both
     argument orders, for free.
</code></pre>
<h3 id="return-type-the-three-comparison-categories">Return type: the three comparison categories</h3>
<pre><code>   std::strong_ordering    : a==b ⇒ f(a)==f(b) for all f; values substitutable.
                             { less, equal, greater }                (e.g. int)
   std::weak_ordering      : equivalence ≠ equality (e.g. case-insensitive string).
                             { less, equivalent, greater }
   std::partial_ordering   : some pairs unordered (e.g. floating point NaN).
                             { less, equivalent, greater, unordered }
   Conversions: strong → weak → partial (you can return a stronger one where a
   weaker is expected). Compare the result with named helpers:
     std::is_lt(r) is_lteq(r) is_gt(r) is_gteq(r) is_eq(r) is_neq(r)
</code></pre>
<h3 id="custom-non-defaulted-signatures">Custom (non-defaulted) signatures</h3>
<pre><code class="language-cpp">struct Ci {                                   // case-insensitive, by one field
    std::string s;
    std::weak_ordering operator&lt;=&gt;(const Ci&amp; o) const {
        // compare lowercased; weak because &quot;ABC&quot; and &quot;abc&quot; are equivalent, not equal
        return toLower(s) &lt;=&gt; toLower(o.s);
    }
    bool operator==(const Ci&amp; o) const {      // ⚠️ custom &lt;=&gt; does NOT auto-generate ==
        return toLower(s) == toLower(o.s);
    }
};

// heterogeneous comparison (compare V with int):
struct V {
    int v;
    friend std::strong_ordering operator&lt;=&gt;(const V&amp; a, int b){ return a.v &lt;=&gt; b; }
    friend bool operator==(const V&amp; a, int b){ return a.v == b; }
    // rewrites give you  int &lt; V , V &gt; int , etc. automatically (reversed candidates)
};
</code></pre>
<pre><code>   SIGNATURE PATTERNS:
     auto operator&lt;=&gt;(const T&amp;) const = default;             // all 6 + ==, memberwise
     std::strong_ordering operator&lt;=&gt;(const T&amp;) const;       // custom ordering
     friend std::weak_ordering operator&lt;=&gt;(const T&amp;, const U&amp;);  // heterogeneous
     bool operator==(const T&amp;) const = default;              // memberwise equality
   RULES:
     • defaulted &lt;=&gt;  ⇒ also defaults ==.
     • user-provided &lt;=&gt; ⇒ does NOT generate == (define it separately).
     • == and != are &quot;equality&quot; operators; &lt; &lt;= &gt; &gt;= are &quot;relational&quot;, derived from &lt;=&gt;.
</code></pre>
<p>⚠️ Why <code>==</code> is separate from <code>&lt;=&gt;</code>: equality can be <strong>cheaper</strong> than ordering
(e.g. compare <code>std::vector</code> sizes first for <code>==</code>, but you can&rsquo;t shortcut ordering).
The committee kept them independent so you can optimize <code>==</code>.</p>
<hr />
<h2 id="89-logical---and-comma---avoid">8.9 Logical <code>&amp;&amp; ||</code> and comma <code>,</code> — AVOID</h2>
<p>You <em>can</em> overload these, but you <strong>lose their built-in semantics</strong>:</p>
<pre><code>   built-in  a &amp;&amp; b : evaluates a; if false, SKIPS b (short-circuit), sequenced.
   overloaded a &amp;&amp; b : becomes a function call operator&amp;&amp;(a,b) ⇒ BOTH operands
                       ALWAYS evaluated, in UNSPECIFIED order, NO short-circuit.
   built-in  a , b  : evaluates a, discards it, sequenced-before b.
   overloaded a , b : function call; no sequencing guarantee.
</code></pre>
<p>🧠 Real-world: expression-template libraries historically (ab)used these; modern
code uses named functions or ranges. <strong>Do not overload <code>&amp;&amp;</code>, <code>||</code>, <code>,</code>.</strong></p>
<hr />
<h2 id="810-subscript-">8.10 Subscript <code>[]</code></h2>
<p><strong>Must be a member.</strong> Provide a const and non-const overload (and ideally an
rvalue overload for move-out). C++23 allows <strong>multiple subscript arguments</strong> and
<strong><code>static</code>/explicit-object</strong> forms.</p>
<pre><code class="language-cpp">class Buffer {
    int* d_; std::size_t n_;
public:
    int&amp;       operator[](std::size_t i)       { return d_[i]; }   // mutable elements
    const int&amp; operator[](std::size_t i) const { return d_[i]; }   // const access
    // C++23: multidimensional subscript
    // double&amp; operator[](std::size_t r, std::size_t c);
    // C++23: explicit object parameter (&quot;deducing this&quot;) unifies const/non-const:
    // template&lt;class Self&gt; auto&amp;&amp; operator[](this Self&amp;&amp; self, std::size_t i) {
    //     return std::forward&lt;Self&gt;(self).d_[i];
    // }
};
</code></pre>
<pre><code>   SIGNATURE PATTERNS (member only):
     Ref       operator[](Index i);
     ConstRef  operator[](Index i) const;
     Ref       operator[](Index r, Index c);   // C++23 multidim
   NOTE: no bounds checking by convention (use .at() for checked access, like std::vector).
</code></pre>
<hr />
<h2 id="811-function-call-">8.11 Function call <code>()</code></h2>
<p><strong>Must be a member</strong> (C++23 allows <code>static</code>). Any arity, default args allowed.
A class with <code>operator()</code> is a <strong>function object / functor</strong> — the basis of lambdas.</p>
<pre><code class="language-cpp">struct Adder {
    int base;
    int  operator()(int x) const { return base + x; }            // unary
    int  operator()(int x, int y) const { return base + x + y; } // binary (overloaded)
};
struct Generator {
    int n = 0;
    int operator()() { return n++; }     // nullary, mutating ⇒ stateful
};
// C++23 static operator() (no per-object state needed):
struct Hash { static std::size_t operator()(std::string_view s); };
</code></pre>
<pre><code>   SIGNATURE PATTERNS (member, any arity, default args OK):
     R operator()(Args...) [const] [noexcept];
     static R operator()(Args...);          // C++23
   USES: comparators, predicates, custom deleters, allocators, transparent functors.
</code></pre>
<hr />
<h2 id="812-member-access---and--">8.12 Member access <code>-&gt;</code> and <code>-&gt;*</code></h2>
<p><code>operator-&gt;</code> <strong>must be a member</strong>; it is special — it is applied <strong>recursively</strong>
until it yields a raw pointer. This is how smart pointers and iterators &ldquo;drill&rdquo;.</p>
<pre><code class="language-cpp">template&lt;class T&gt;
class Ptr {
    T* p_;
public:
    T*       operator-&gt;()       { return p_; }   // ptr-&gt;m  ≡  ptr.operator-&gt;()-&gt;m
    const T* operator-&gt;() const { return p_; }
    T&amp;       operator*()  const { return *p_; }  // see §8.13
};
</code></pre>
<pre><code>   RESOLUTION of  x-&gt;member :
     if x is a class type with operator-&gt;, replace x-&gt;member with
        (x.operator-&gt;())-&gt;member   and REPEAT until a raw pointer is reached.
   SIGNATURE: pointer-like  T* operator-&gt;();   (or another class with its own -&gt;)
   -&gt;*  (pointer-to-member through a smart pointer) is rarely overloaded:
        R&amp; operator-&gt;*(MemberPtr);
</code></pre>
<hr />
<h2 id="813-dereference--and-address-of--unary">8.13 Dereference <code>*</code> and address-of <code>&amp;</code> (unary)</h2>
<pre><code class="language-cpp">template&lt;class T&gt;
class Ptr {
    T* p_;
public:
    T&amp;  operator*()  const { return *p_; }   // unary deref: *ptr → the object
    T*  operator-&gt;() const { return p_; }
    // T* operator&amp;();  // DON'T overload address-of — breaks std::addressof users
};
</code></pre>
<pre><code>   SIGNATURE (member): T&amp; operator*() const;   // unary, no params, returns the pointee
   Pair operator* with operator-&gt; for pointer-like types (smart pointers, iterators).
</code></pre>
<hr />
<h2 id="814-conversion-operators">8.14 Conversion operators</h2>
<p><strong>Must be members.</strong> No explicit return type written (it&rsquo;s in the name). Make them
<code>explicit</code> to avoid surprising implicit conversions.</p>
<pre><code class="language-cpp">class Fraction {
    int n_, d_;
public:
    explicit operator double() const { return double(n_) / d_; }  // explicit conversion
    explicit operator bool()   const { return n_ != 0; }          // for if(frac), while, etc.
    operator std::string() const;                                  // implicit (use sparingly)
    // C++20: conditionally explicit
    // explicit(sizeof(int) &gt; 2) operator int() const;
};
</code></pre>
<pre><code>   SIGNATURE PATTERN (member):  [explicit] operator TargetType() const;
   • NO return type token (the type IS the name).
   • Can convert to references/pointers: operator T&amp;(); operator const T*() const;
   • 'explicit' blocks implicit use but STILL allows:
        - static_cast&lt;TargetType&gt;(x)
        - contextual conversions to bool (if/while/&amp;&amp;/||/?: condition, !x)
   • An implicit conversion operator + a converting constructor on the other type
     can cause AMBIGUITY — prefer explicit and named conversion functions.
</code></pre>
<p>🧠 <code>explicit operator bool()</code> is the canonical &ldquo;is this usable?&rdquo; check used by
<code>std::optional</code>, smart pointers, and streams (<code>if (file)</code>). Because of the
&ldquo;contextual conversion to bool&rdquo; rule, it works in conditions without a cast but
won&rsquo;t silently convert to <code>int</code>.</p>
<hr />
<h2 id="815-allocation--deallocation-new-new-delete-delete">8.15 Allocation &amp; deallocation: <code>new</code>, <code>new[]</code>, <code>delete</code>, <code>delete[]</code></h2>
<p>These are not &ldquo;operators on values&rdquo; — they are <strong>allocation functions</strong> the
<code>new</code>/<code>delete</code> <em>expressions</em> call. You can overload them globally or per-class.</p>
<pre><code class="language-cpp">class Tracked {
public:
    static void* operator new(std::size_t sz);                    // class-specific allocation
    static void  operator delete(void* p) noexcept;               // class-specific dealloc
    static void* operator new[](std::size_t sz);                  // array form
    static void  operator delete[](void* p) noexcept;
    static void* operator new(std::size_t sz, std::align_val_t a);// C++17 over-aligned
    static void  operator delete(void* p, std::size_t sz) noexcept;// sized delete (C++14)
    // placement forms (don't allocate; construct into given memory):
    static void* operator new(std::size_t, void* where) noexcept { return where; }
};

// global replacements (affect the whole program):
void* operator new(std::size_t sz);                  // replaceable
void  operator delete(void* p) noexcept;
void* operator new(std::size_t sz, std::nothrow_t) noexcept;  // new(std::nothrow) T
</code></pre>
<pre><code>   new T(args)  ⇒  1) call operator new(sizeof(T))  → raw memory
                   2) construct T in that memory
                   3) yield T*
   delete p     ⇒  1) p-&gt;~T()
                   2) call operator delete(p)
   SIGNATURE RULES:
     operator new   returns void*, first param std::size_t (the byte count).
     operator delete returns void, first param void*, must be noexcept.
     extra params on operator new ⇒ &quot;placement new&quot;: new (extra...) T(...).
     For each placement operator new you SHOULD provide a matching operator delete
     (called if the constructor throws), else you can leak.
</code></pre>
<p>🧠 Per-class <code>operator new</code>/<code>delete</code> power memory pools, arena allocators, leak
trackers, and <code>std::pmr</code>. Placement <code>new</code> (the <code>&lt;new&gt;</code> header form) is how
<code>std::vector</code> constructs elements in pre-allocated storage (Module 03).</p>
<hr />
<h2 id="816-co_await">8.16 <code>co_await</code></h2>
<p>C++20 coroutine operator. Overload to make a type &ldquo;awaitable&rdquo; (returns an awaiter).</p>
<pre><code class="language-cpp">struct Task {
    auto operator co_await() const noexcept;   // returns an awaiter (await_ready/suspend/resume)
};
// free form also allowed:
// Awaiter operator co_await(Awaitable);
</code></pre>
<p>See <a href="14_cpp20_features.md">Module 14 §14.3</a> for awaiter mechanics
(<code>await_ready</code>, <code>await_suspend</code>, <code>await_resume</code>).</p>
<hr />
<h2 id="817-stream-insertion---extraction-">8.17 Stream insertion <code>&lt;&lt;</code> &amp; extraction <code>&gt;&gt;</code></h2>
<p><strong>Non-member</strong> (the left operand is the stream). Return the stream reference for
chaining. Declare <code>friend</code> if private access is needed.</p>
<pre><code class="language-cpp">#include &lt;iostream&gt;
class Point {
    int x_, y_;
public:
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp; os, const Point&amp; p) {
        return os &lt;&lt; '(' &lt;&lt; p.x_ &lt;&lt; &quot;, &quot; &lt;&lt; p.y_ &lt;&lt; ')';
    }
    friend std::istream&amp; operator&gt;&gt;(std::istream&amp; is, Point&amp; p) {
        char lparen, comma, rparen;
        is &gt;&gt; lparen &gt;&gt; p.x_ &gt;&gt; comma &gt;&gt; p.y_ &gt;&gt; rparen;          // parse &quot;(x, y)&quot;
        if (lparen!='(' || comma!=',' || rparen!=')') is.setstate(std::ios::failbit);
        return is;
    }
};
</code></pre>
<pre><code>   SIGNATURE PATTERNS (non-member):
     std::ostream&amp; operator&lt;&lt;(std::ostream&amp; os, const T&amp; value);  // output: T is const&amp;
     std::istream&amp; operator&gt;&gt;(std::istream&amp; is, T&amp; value);        // input:  T is non-const&amp;
   RETURN the stream BY REFERENCE to enable  os &lt;&lt; a &lt;&lt; b &lt;&lt; c;
   On parse failure set is.setstate(std::ios::failbit).
</code></pre>
<p>🧠 In C++20+ prefer providing a <code>std::formatter&lt;T&gt;</code> specialization so your type
works with <code>std::format</code>/<code>std::print</code> (type-safe, faster) — see Module 14 §14.6.
You can still keep <code>operator&lt;&lt;</code> for iostream compatibility.</p>
<hr />
<h2 id="818-complete-worked-example--an-arithmetic-value-type">8.18 Complete worked example — an arithmetic value type</h2>
<pre><code class="language-cpp">#include &lt;compare&gt;
#include &lt;iostream&gt;

class Rational {
    long n_ = 0, d_ = 1;
    void normalize();                       // reduce + keep denom positive
public:
    Rational() = default;
    Rational(long n, long d = 1) : n_(n), d_(d) { normalize(); }   // converting ctor

    // compound assignment (members, mutating) — the PRIMARY operations
    Rational&amp; operator+=(const Rational&amp; r);
    Rational&amp; operator-=(const Rational&amp; r);
    Rational&amp; operator*=(const Rational&amp; r);
    Rational&amp; operator/=(const Rational&amp; r);

    // unary
    Rational operator-() const { return Rational{-n_, d_}; }
    Rational operator+() const { return *this; }

    // increment (for completeness)
    Rational&amp; operator++()    { n_ += d_; return *this; }
    Rational  operator++(int) { Rational t=*this; ++*this; return t; }

    // comparison (C++20): one line gives all six + reversed args + heterogeneous via ctor
    auto operator&lt;=&gt;(const Rational&amp; r) const {
        return n_ * r.d_ &lt;=&gt; r.n_ * d_;     // strong_ordering
    }
    bool operator==(const Rational&amp; r) const { return n_==r.n_ &amp;&amp; d_==r.d_; }

    // explicit conversion
    explicit operator double() const { return double(n_) / d_; }

    // binary arithmetic (non-member friends, via compound ops) — symmetric, allow 2 + r
    friend Rational operator+(Rational a, const Rational&amp; b){ a += b; return a; }
    friend Rational operator-(Rational a, const Rational&amp; b){ a -= b; return a; }
    friend Rational operator*(Rational a, const Rational&amp; b){ a *= b; return a; }
    friend Rational operator/(Rational a, const Rational&amp; b){ a /= b; return a; }

    // stream output
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp; os, const Rational&amp; r){
        return os &lt;&lt; r.n_ &lt;&lt; '/' &lt;&lt; r.d_;
    }
};
</code></pre>
<p>This single type exercises: converting ctor, member compound assign, non-member
binary ops, unary, increment (pre/post), <code>&lt;=&gt;</code>+<code>==</code>, explicit conversion, and
stream insertion — the full canonical operator set for a value type.</p>

<h2 id="819-pitfalls--guidelines-expert-checklist">8.19 Pitfalls &amp; guidelines (expert checklist)</h2>
<pre><code>   ⚠️ Member binary op blocks left-operand conversion (2 + obj fails) → use non-member.
   ⚠️ Forgetting to return *this / the stream → broken chaining.
   ⚠️ Custom operator&lt;=&gt; does NOT generate operator== — define both.
   ⚠️ Overloading &amp;&amp; || , → loses short-circuit/sequencing.
   ⚠️ Overloading unary &amp; → breaks std::addressof / generic code.
   ⚠️ Implicit conversion operator + converting ctor → ambiguity; prefer explicit.
   ⚠️ Postfix ++/-- without the dummy int param won't compile as postfix.
   ⚠️ operator delete that throws → undefined; must be noexcept.
   ✅ Implement binary ops via compound members. Provide const &amp; non-const [].
   ✅ Default &lt;=&gt; and == when memberwise semantics are correct.
   ✅ Keep semantics intuitive (operator+ adds). Maintain consistency (== reflexive,
      &lt; a strict weak ordering) so STL containers/algorithms behave.
   ✅ Provide a std::formatter specialization (C++20) for std::format support.
</code></pre>

<p>Templates are C++&rsquo;s mechanism for writing code parameterized by <strong>types</strong> and
<strong>values</strong>, instantiated and type-checked at compile time. They power the STL,
enable zero-overhead abstraction, and are the basis of metaprogramming.

<h2 id="91-the-core-idea-code-that-writes-code">9.1 The core idea: code that writes code</h2>
<pre><code class="language-cpp">template&lt;class T&gt;
T max(T a, T b) { return a &lt; b ? b : a; }   // a PATTERN, not yet code

max(3, 7);        // instantiates max&lt;int&gt;(int,int)   ← compiler generates it
max(2.5, 1.5);    // instantiates max&lt;double&gt;(...)
max(&quot;a&quot;s, &quot;b&quot;s);  // instantiates max&lt;std::string&gt;(...)
</code></pre>
<pre><code>   template&lt;class T&gt; ...        SOURCE PATTERN (no machine code emitted)
            │  instantiated on demand for each set of template arguments
            ▼
   max&lt;int&gt;      max&lt;double&gt;      max&lt;std::string&gt;   ← separate generated functions
   (compiler stamps out one specialization per distinct argument list)
</code></pre>
<p>🧠 A template is <strong>not</strong> compiled until <strong>instantiated</strong>. This is why template
definitions live in headers (the full body must be visible at each use), and why
template error messages are long (they surface at instantiation).</p>
<p><code>typename</code> and <code>class</code> are interchangeable in <code>template&lt;...&gt;</code> parameter lists;
<code>typename</code> is also required to say &ldquo;this dependent name is a type&rdquo; (9.7).</p>
<hr />
<h2 id="92-function-templates-deduction--explicit-args">9.2 Function templates: deduction &amp; explicit args</h2>
<pre><code class="language-cpp">template&lt;class T&gt; void f(T x);
f(42);              // T = int (deduced)
f&lt;double&gt;(42);      // T = double (explicit), 42 converted

template&lt;class R, class T&gt; R cast_to(T x){ return static_cast&lt;R&gt;(x); }
cast_to&lt;int&gt;(3.9);  // R explicit (can't deduce return type), T = double deduced
</code></pre>
<p>Deduction strips top-level const/ref like <code>auto</code> (Module 01). For <code>T&amp;&amp;</code>
parameters it forms forwarding references (Module 06).</p>
<pre><code>   PARAM FORM     ARGUMENT      DEDUCED T        param type
   f(T  x)        int / int&amp;    int              int      (copy; const/ref stripped)
   f(T&amp; x)        int           int              int&amp;
   f(const T&amp; x)  int / const   int              const int&amp;
   f(T&amp;&amp; x)       lvalue int    int&amp;             int&amp;     (collapses) ← forwarding ref
   f(T&amp;&amp; x)       rvalue int    int              int&amp;&amp;
</code></pre>
<hr />
<h2 id="93-class-templates">9.3 Class templates</h2>
<pre><code class="language-cpp">template&lt;class T, std::size_t N&gt;
class Array {                      // T = element type, N = a NON-TYPE param (a value)
    T data_[N];
public:
    constexpr std::size_t size() const { return N; }
    T&amp;       operator[](std::size_t i)       { return data_[i]; }
    const T&amp; operator[](std::size_t i) const { return data_[i]; }
};
Array&lt;int, 4&gt; a;     // T=int, N=4
</code></pre>
<p><strong>Class template argument deduction (CTAD, C++17)</strong> lets you omit args:</p>
<pre><code class="language-cpp">std::vector v{1, 2, 3};       // deduces std::vector&lt;int&gt;
std::pair  p{1, 2.0};         // std::pair&lt;int,double&gt;
// custom deduction guide:
template&lt;class T&gt; Array(std::initializer_list&lt;T&gt;) -&gt; Array&lt;T, /*...*/&gt;;  // (illustrative)
</code></pre>
<p>Template parameter kinds:</p>
<pre><code>   • TYPE parameters:      template&lt;class T&gt;
   • NON-TYPE params(NTTP): template&lt;int N&gt;, &lt;std::size_t&gt;, &lt;auto&gt;, (C++20: float, structural types)
   • TEMPLATE template params: template&lt;template&lt;class&gt; class Container&gt;
   • parameter packs (variadic): template&lt;class... Ts&gt;
</code></pre>
<hr />
<h2 id="94-specialization-full--partial">9.4 Specialization: full &amp; partial</h2>
<pre><code class="language-cpp">template&lt;class T&gt; struct TypeName            { static constexpr auto value = &quot;unknown&quot;; };
template&lt;&gt;        struct TypeName&lt;int&gt;       { static constexpr auto value = &quot;int&quot;; };   // FULL
template&lt;&gt;        struct TypeName&lt;double&gt;    { static constexpr auto value = &quot;double&quot;; };

template&lt;class T&gt; struct TypeName&lt;T*&gt;        { static constexpr auto value = &quot;pointer&quot;; }; // PARTIAL
template&lt;class T&gt; struct TypeName&lt;T[]&gt;       { static constexpr auto value = &quot;array&quot;; };   // PARTIAL
</code></pre>
<pre><code>   PRIMARY template      ── the general case
   FULL specialization   ── exact match for specific args (functions: prefer overloading)
   PARTIAL specialization── pattern match (T*, T&amp;, std::vector&lt;T&gt;, ...) — CLASSES ONLY
</code></pre>
<p>⚠️ Function templates <strong>cannot</strong> be partially specialized — use overloading or
<code>if constexpr</code> instead.</p>
<hr />
<h2 id="95-variadic-templates--parameter-packs">9.5 Variadic templates &amp; parameter packs</h2>
<pre><code class="language-cpp">template&lt;class... Ts&gt;                 // Ts is a TYPE pack
void printAll(const Ts&amp;... args) {    // args is a FUNCTION param pack
    (std::cout &lt;&lt; ... &lt;&lt; args) &lt;&lt; '\\n';   // C++17 FOLD EXPRESSION
}
printAll(1, &quot; hi &quot;, 3.14, '!');       // expands to cout &lt;&lt; 1 &lt;&lt; &quot; hi &quot; &lt;&lt; 3.14 &lt;&lt; '!'
</code></pre>
<pre><code>   FOLD EXPRESSIONS (C++17)  — collapse a pack with a binary operator
   (... op pack)      left fold      ((a op b) op c) op d
   (pack op ...)      right fold     a op (b op (c op d))
   (init op ... op pack) / (pack op ... op init)  with an initial value

   sizeof...(Ts)     ← number of elements in the pack
</code></pre>
<p>Classic recursive expansion (pre-fold style, still useful for per-element logic):</p>
<pre><code class="language-cpp">void print() {}                                   // base case
template&lt;class T, class... Rest&gt;
void print(const T&amp; first, const Rest&amp;... rest) {
    std::cout &lt;&lt; first;
    print(rest...);                               // peel one off, recurse
}
</code></pre>
<p>Perfect forwarding a pack (e.g. <code>make_unique</code>):</p>
<pre><code class="language-cpp">template&lt;class T, class... Args&gt;
std::unique_ptr&lt;T&gt; my_make_unique(Args&amp;&amp;... args) {
    return std::unique_ptr&lt;T&gt;(new T(std::forward&lt;Args&gt;(args)...));  // forward each
}
</code></pre>
<hr />
<h2 id="96-if-constexpr--compile-time-branching-c17-">9.6 <code>if constexpr</code> — compile-time branching (C++17) 🧠</h2>
<pre><code class="language-cpp">template&lt;class T&gt;
auto to_string(const T&amp; x) {
    if constexpr (std::is_arithmetic_v&lt;T&gt;)
        return std::to_string(x);      // ← only this branch compiled when T is numeric
    else if constexpr (std::is_same_v&lt;T, std::string&gt;)
        return x;
    else
        return std::string{x};         // the OTHER branches are DISCARDED, not just skipped
}
</code></pre>
<p>The discarded branch is not instantiated, so it may contain code that would be
invalid for the current <code>T</code>. This replaced most old SFINAE/tag-dispatch tricks.</p>

<h2 id="97-dependent-names--typenametemplate-disambiguators">9.7 Dependent names &amp; <code>typename</code>/<code>template</code> disambiguators</h2>
<pre><code class="language-cpp">template&lt;class C&gt;
void f(C&amp; c) {
    typename C::value_type x;        // ⚠️ 'typename' required: C::value_type is a dependent TYPE
    auto it = c.template get&lt;0&gt;();   // ⚠️ '.template' required: get is a dependent TEMPLATE
}
</code></pre>
<pre><code>   Inside a template, the compiler doesn't yet know what C is, so:
   • prefix a dependent type name with 'typename'
   • prefix a dependent member template with 'template'
   Otherwise the parser assumes 'value_type' is a value and '&lt;' is less-than.
</code></pre>
<hr />
<h2 id="98-sfinae--substitution-failure-is-not-an-error">9.8 SFINAE — &ldquo;Substitution Failure Is Not An Error&rdquo;</h2>
<p>When substituting template args produces an ill-formed <em>signature</em> (not body), the
candidate is silently removed from the overload set rather than causing an error.</p>
<pre><code class="language-cpp">// enable this overload only for integral T
template&lt;class T, std::enable_if_t&lt;std::is_integral_v&lt;T&gt;, int&gt; = 0&gt;
void g(T x) { /* integer path */ }

template&lt;class T, std::enable_if_t&lt;std::is_floating_point_v&lt;T&gt;, int&gt; = 0&gt;
void g(T x) { /* float path */ }
</code></pre>
<p>🧠 SFINAE was the pre-C++20 workhorse for constraints. <strong>In C++20, prefer
Concepts</strong> (Module 14) — they do the same job with readable syntax and better
errors. Know SFINAE because you&rsquo;ll read older code and library internals.</p>
<hr />
<h2 id="99-crtp--static-polymorphism-curiously-recurring-template-pattern">9.9 CRTP — static polymorphism (Curiously Recurring Template Pattern)</h2>
<pre><code class="language-cpp">template&lt;class Derived&gt;
struct Comparable {                              // mixin via CRTP
    bool operator!=(const Derived&amp; o) const {
        const auto&amp; self = static_cast&lt;const Derived&amp;&gt;(*this);
        return !(self == o);                     // requires Derived::operator==
    }
};
struct Point : Comparable&lt;Point&gt; {
    int x, y;
    bool operator==(const Point&amp; o) const { return x==o.x &amp;&amp; y==o.y; }
};
</code></pre>
<pre><code>   CRTP: a base templated on its OWN derived class.
   struct D : Base&lt;D&gt; { ... };
   → Base can call into D's methods via static_cast&lt;D&amp;&gt;(*this) — resolved at
     compile time. Zero vtable, fully inlinable. Used for mixins, the
     enable_shared_from_this pattern, expression templates, policy-based design.
</code></pre>
<p>🧠 CRTP vs virtual: CRTP gives static dispatch (no runtime cost, but type is fixed
at compile time and you can&rsquo;t store heterogeneous objects in one container as the
same type). Virtual gives runtime flexibility at the cost of indirection.</p>
<hr />
<h2 id="910-template-metaprogramming--type-traits">9.10 Template metaprogramming &amp; type traits</h2>
<p><code>&lt;type_traits&gt;</code> provides compile-time introspection and transformation:</p>
<pre><code class="language-cpp">std::is_integral_v&lt;T&gt;            // bool: is T an integer type?
std::is_same_v&lt;T, U&gt;             // bool
std::is_base_of_v&lt;B, D&gt;          // bool
std::remove_reference_t&lt;T&gt;       // strip &amp; / &amp;&amp;
std::remove_cv_t&lt;T&gt;              // strip const/volatile
std::decay_t&lt;T&gt;                  // what 'auto'/by-value deduction would give
std::conditional_t&lt;C, A, B&gt;      // C ? A : B   (a TYPE chosen at compile time)
std::common_type_t&lt;Ts...&gt;        // the common type of several
</code></pre>
<p>A tiny metaprogram (compile-time factorial):</p>
<pre><code class="language-cpp">template&lt;int N&gt; struct Fact { static constexpr long value = N * Fact&lt;N-1&gt;::value; };
template&lt;&gt;      struct Fact&lt;0&gt;{ static constexpr long value = 1; };
static_assert(Fact&lt;5&gt;::value == 120);   // computed entirely at compile time

// modern equivalent: just a constexpr function
constexpr long fact(int n){ return n ? n*fact(n-1) : 1; }
static_assert(fact(5) == 120);
</code></pre>
<p>🧠 Modern TMP increasingly uses <code>constexpr</code> functions + <code>if constexpr</code> + Concepts
instead of recursive class templates. Reserve heavy template recursion for cases
that truly need type-level computation.</p>
<hr />
<h2 id="911-static_assert--compile-time-contracts">9.11 <code>static_assert</code> &amp; compile-time contracts</h2>
<pre><code class="language-cpp">template&lt;class T&gt;
class FixedPoint {
    static_assert(std::is_integral_v&lt;T&gt;, &quot;FixedPoint requires an integral storage type&quot;);
};
static_assert(sizeof(void*) == 8, &quot;64-bit only&quot;);
</code></pre>
<hr />
<h2 id="912-variable-templates-alias-templates--template-template-parameters">9.12 Variable templates, alias templates &amp; template template parameters</h2>
<h3 id="variable-templates-c14">Variable templates (C++14)</h3>
<pre><code class="language-cpp">template&lt;class T&gt; constexpr T pi = T(3.14159265358979323846);  // a templated VARIABLE
double d = pi&lt;double&gt;;   float f = pi&lt;float&gt;;

template&lt;class T&gt; constexpr bool is_pointer_v = std::is_pointer&lt;T&gt;::value;  // the _v traits
</code></pre>
<h3 id="alias-templates">Alias templates</h3>
<pre><code class="language-cpp">template&lt;class T&gt; using Vec = std::vector&lt;T&gt;;          // alias TEMPLATE (typedef can't do this)
Vec&lt;int&gt; v;                                            // == std::vector&lt;int&gt;
template&lt;class T&gt; using ElementType = typename T::value_type;
</code></pre>
<pre><code>   typedef       : alias for ONE concrete type (no parameters)
   using alias   : same as typedef for concrete types
   alias TEMPLATE: parameterized alias — typedef CANNOT express this
   ⚠️ alias templates are NEVER deduced and cannot be specialized.
</code></pre>
<h3 id="template-template-parameters">Template template parameters</h3>
<pre><code class="language-cpp">template&lt;class T, template&lt;class, class&gt; class Container = std::vector&gt;
class Stack {
    Container&lt;T, std::allocator&lt;T&gt;&gt; data_;   // the container TYPE is itself a template
};
Stack&lt;int&gt; s;                                // uses std::vector&lt;int&gt;
Stack&lt;int, std::deque&gt; s2;                   // uses std::deque&lt;int&gt;
</code></pre>
<pre><code>   template&lt;template&lt;class...&gt; class TT&gt; struct X;   // TT is a TEMPLATE, not a type
   Use a variadic template-template param  template&lt;class...&gt; class  to accept
   containers with any number of (defaulted) parameters portably.
</code></pre>
<hr />
<h2 id="913-class-template-argument-deduction-ctad--deduction-guides">9.13 Class Template Argument Deduction (CTAD) &amp; deduction guides</h2>
<p>CTAD (C++17) lets you omit class template arguments; the compiler deduces them
from the constructor arguments.</p>
<pre><code class="language-cpp">std::vector v{1, 2, 3};        // deduces std::vector&lt;int&gt;
std::pair  p{1, 2.0};          // std::pair&lt;int, double&gt;
std::lock_guard lk{mtx};       // std::lock_guard&lt;std::mutex&gt;
std::array a{1, 2, 3};         // std::array&lt;int, 3&gt;
</code></pre>
<p>User-defined <strong>deduction guides</strong> steer CTAD when constructor deduction isn&rsquo;t
enough (e.g. deducing from iterators, or decaying types):</p>
<pre><code class="language-cpp">template&lt;class T&gt;
struct Box { T value; Box(T v) : value(v) {} };
Box(const char*) -&gt; Box&lt;std::string&gt;;          // guide: Box{&quot;hi&quot;} ⟶ Box&lt;std::string&gt;
Box b{&quot;hi&quot;};                                    // value is std::string, not const char*

template&lt;class It&gt;
struct Range { It begin_, end_; Range(It b, It e); };
template&lt;class It&gt; Range(It, It) -&gt; Range&lt;It&gt;;  // deduce element/iterator type

// implicit guides are generated from constructors; aggregates get them in C++20.
</code></pre>
<pre><code>   DEDUCTION GUIDE syntax:   TemplateName(param-types) -&gt; TemplateName&lt;args&gt;;
   • placed at namespace scope, after the class.
   • used ONLY for CTAD (when you write the class name without &lt;...&gt;).
</code></pre>
<hr />
<h2 id="914-explicit-instantiation-extern-template--instantiation-control">9.14 Explicit instantiation, <code>extern template</code> &amp; instantiation control</h2>
<pre><code class="language-cpp">// header: declaration only — suppress implicit instantiation in every TU
extern template class std::vector&lt;MyType&gt;;     // &quot;don't instantiate here&quot;

// ONE .cpp: explicit instantiation definition — emit the code exactly once
template class std::vector&lt;MyType&gt;;            // full class
template int max&lt;int&gt;(int, int);               // a function specialization
</code></pre>
<pre><code>   IMPLICIT instantiation: compiler stamps out code on first use, in EVERY TU
     that uses it (linker merges duplicates) → slower builds, bigger objects.
   EXPLICIT instantiation (template class X&lt;T&gt;;): force generation once.
   extern template: tell other TUs NOT to instantiate (pair with one explicit def).
   ⇒ Use the pair to cut compile time / code bloat for heavily-used instantiations.
</code></pre>
<hr />
<h2 id="915-overload-resolution-among-templates--partial-ordering">9.15 Overload resolution among templates &amp; partial ordering</h2>
<p>When multiple templates (and non-templates) match, C++ applies a precise ranking:</p>
<pre><code>   1. A non-template function that is an exact (or better) match BEATS any template.
   2. Among templates, the MORE SPECIALIZED one wins (&quot;partial ordering of templates&quot;).
   3. Among class template partial specializations, the more specialized matches.
   4. If still tied → AMBIGUOUS (error).
   5. Constraints (C++20 concepts): a more-constrained candidate beats a less-constrained.
</code></pre>
<pre><code class="language-cpp">template&lt;class T&gt; void f(T);        // (a) generic
template&lt;class T&gt; void f(T*);       // (b) more specialized (pointer)
void f(int*);                       // (c) non-template

int  i; f(i);    // (a)  — only generic matches
int* p; f(p);    // (c)  — non-template beats both templates
double* d; f(d); // (b)  — more specialized template than (a)
</code></pre>
<p>🧠 &ldquo;More specialized&rdquo; means: every argument list that matches the specialized one
also matches the general one, but not vice-versa. This is <em>partial ordering</em>, the
same mechanism that picks the best class partial specialization (§9.4).</p>
<hr />
<h2 id="916-fold-expressions--complete-reference-c17">9.16 Fold expressions — complete reference (C++17)</h2>
<pre><code>   FORM                       EXPANSION (for pack e1, e2, ..., eN)
   ──────────────────────────────────────────────────────────────────────────
   (pack op ...)              unary RIGHT fold : e1 op (e2 op (... op eN))
   (... op pack)              unary LEFT  fold : ((e1 op e2) op ...) op eN
   (pack op ... op init)      binary RIGHT fold: e1 op (e2 op (... op (eN op init)))
   (init op ... op pack)      binary LEFT  fold: (((init op e1) op e2) ...) op eN

   EMPTY-PACK rules: only &amp;&amp;(→true), ||(→false), and ,(→void()) are allowed
   to fold an empty pack. Others need a binary fold with an init value.
</code></pre>
<pre><code class="language-cpp">template&lt;class... T&gt; bool all(T... x)      { return (x &amp;&amp; ...); }       // unary right
template&lt;class... T&gt; auto sum(T... x)      { return (x + ...); }        // unary right
template&lt;class... T&gt; auto sum0(T... x)     { return (0 + ... + x); }    // binary, safe on empty
template&lt;class... T&gt; void print(T... x)    { ((std::cout &lt;&lt; x &lt;&lt; ' '), ...); } // comma fold
template&lt;class... T&gt; auto count(T...)      { return sizeof...(T); }     // pack size
</code></pre>
<hr />
<h2 id="917-requires-expressions--constraints-c20-reference">9.17 <code>requires</code> expressions &amp; constraints (C++20 reference)</h2>
<p>(Used heavily in <a href="14_cpp20_features.md">Module 14 §14.1</a>; here is the syntax catalog.)</p>
<pre><code class="language-cpp">template&lt;class T&gt;
concept Sortable = requires(T&amp; c, typename T::value_type v) {
    typename T::value_type;                          // TYPE requirement
    c.begin();  c.end();                             // SIMPLE requirement (must be valid)
    { c.size() } -&gt; std::convertible_to&lt;std::size_t&gt;;// COMPOUND requirement (valid + type)
    { c.push_back(v) } noexcept;                     // COMPOUND with noexcept
    requires std::movable&lt;T&gt;;                        // NESTED requirement (a bool)
};

template&lt;class T&gt; requires Sortable&lt;T&gt; void sort_it(T&amp;);   // requires clause
void sort_it(Sortable auto&amp;);                              // terse syntax
</code></pre>
<pre><code>   FOUR requirement kinds inside requires{...}:
     simple    :  expr;                       expr must be well-formed
     type      :  typename T::member;         the type must exist
     compound  :  { expr } noexcept -&gt; Concept; valid, [non-throwing], result models Concept
     nested    :  requires predicate;          a constexpr bool that must hold
   A 'requires requires' you'll see is: 'requires' clause + ad-hoc 'requires' expression.
</code></pre>
<hr />
<h2 id="918-dependent-names--two-phase-lookup-deep">9.18 Dependent names &amp; two-phase lookup (deep)</h2>
<pre><code>   Templates are checked in TWO phases:
   Phase 1 (at DEFINITION): non-dependent names are looked up and bound; syntax checked.
   Phase 2 (at INSTANTIATION): dependent names are looked up using the template args,
                               via ordinary lookup + ADL at the point of instantiation.
</code></pre>
<pre><code class="language-cpp">template&lt;class T&gt;
struct D : Base&lt;T&gt; {
    void f() {
        // x();             // ❌ if x is in Base&lt;T&gt;: NOT found in phase 1 (dependent base)
        this-&gt;x();          // ✅ 'this-&gt;' makes it dependent → looked up in phase 2
        Base&lt;T&gt;::x();       // ✅ explicit qualification also works
        typename T::type y; // ✅ 'typename' : T::type is a dependent TYPE
        T::template get&lt;0&gt;();// ✅ '.template'/'::template' : dependent member template
    }
};
</code></pre>
<p>🧠 Names from a <strong>dependent base class</strong> are not visible unqualified — you must use
<code>this-&gt;</code> or qualify them. This surprises people coming from non-template code where
base members are visible directly.</p>
<hr />
<h2 id="919-costs--pitfalls">9.19 Costs &amp; pitfalls</h2>
<pre><code>   ⚠️ Code bloat: each instantiation generates separate code. Many distinct
      types ⇒ larger binary. (Mitigate: type-erase, extract non-dependent code.)
   ⚠️ Compile-time cost: heavy templates slow the build.
   ⚠️ Error messages: long; concepts (C++20) improve them dramatically.
   ⚠️ Two-phase lookup: names are checked at definition (non-dependent) and at
      instantiation (dependent). GCC/Clang are strict; old MSVC was lax.
   ✅ Put only the template-dependent bits in templates; share the rest.
</code></pre>

<blockquote>
<p>The Standard Template Library is built on three orthogonal pillars —
<strong>containers</strong> (store data), <strong>iterators</strong> (the glue), and <strong>algorithms</strong>
(operate on ranges via iterators). Understanding their <em>complexity</em> and
<em>invalidation</em> rules is what separates correct, fast code from subtle bugs.
<code>[Primer §9, §10, §11]</code></p>
</blockquote>
<hr />
<h2 id="101-the-architecture">10.1 The architecture</h2>
<pre><code>        ALGORITHMS                 ITERATORS                 CONTAINERS
   ┌──────────────────┐        ┌────────────────┐        ┌──────────────────┐
   │ sort, find, copy │        │  abstract the  │        │ vector, list,    │
   │ accumulate, ...  │ ◀────▶ │  position +    │ ◀────▶ │ map, set, ...    │
   │ (know NOTHING    │        │  traversal     │        │ (know NOTHING    │
   │  about container)│        │                │        │ about algorithms)│
   └──────────────────┘        └────────────────┘        └──────────────────┘
              ▲                                                    
              └── FUNCTION OBJECTS / lambdas customize behavior (comparators, predicates)

   Decoupling: M algorithms + N containers = M+N code, not M×N. The iterator is
   the contract between them.
</code></pre>
<hr />
<h2 id="102-sequence-containers--their-internals">10.2 Sequence containers &amp; their internals</h2>
<pre><code>   std::vector&lt;T&gt;      contiguous, growable array         ← THE DEFAULT container
   ┌──┬──┬──┬──┬──┬───────────┐
   │0 │1 │2 │3 │4 │ spare cap │   size()=5, capacity()=8
   └──┴──┴──┴──┴──┴───────────┘
   • random access O(1), cache-friendly. push_back AMORTIZED O(1) (doubles capacity).
   • insert/erase in MIDDLE O(n) (shifts elements).

   std::array&lt;T,N&gt;     fixed-size, stack, no allocation (Module 04)

   std::deque&lt;T&gt;       double-ended queue, segmented blocks
   [blk0][blk1][blk2]  push_front/back O(1); random access O(1) but slower than vector

   std::list&lt;T&gt;        doubly-linked list
   ⇄[a]⇄[b]⇄[c]⇄       insert/erase anywhere O(1) (with iterator); NO random access;
                       poor cache locality. splice() is its superpower.

   std::forward_list&lt;T&gt; singly-linked, minimal overhead
</code></pre>
<p>🧠 <strong>Default to <code>std::vector</code>.</strong> Even for middle insertions it usually beats
<code>std::list</code> because of cache locality, until N is large. Measure before choosing a
node-based container.</p>
<h3 id="size-vs-capacity--reallocation"><code>size</code> vs <code>capacity</code> &amp; reallocation</h3>
<pre><code class="language-cpp">std::vector&lt;int&gt; v;
v.reserve(1000);   // pre-allocate capacity ⇒ avoid repeated reallocation/copying
v.shrink_to_fit(); // (non-binding) release spare capacity
</code></pre>
<pre><code>   push_back when size == capacity:
   1. allocate a bigger buffer (typically 1.5× or 2×)
   2. MOVE/COPY existing elements over   ← O(n), and INVALIDATES all iterators/refs!
   3. free old buffer
   Amortized O(1) because growth is geometric.
</code></pre>
<hr />
<h2 id="103-associative-containers">10.3 Associative containers</h2>
<pre><code>   ORDERED (red-black tree, sorted, O(log n)):
   std::map&lt;K,V&gt;        unique keys → values, sorted by key
   std::set&lt;K&gt;          unique sorted keys
   std::multimap/multiset  allow duplicates

           [m]
          /   \\           in-order traversal yields sorted order
        [d]   [t]         lookup/insert/erase: O(log n)
       /  \\   /  \\        iterators stay valid across insert/erase (except erased)
     [a] [f][p] [z]

   UNORDERED (hash table, average O(1)):
   std::unordered_map&lt;K,V&gt;    hash buckets, NO ordering
   std::unordered_set&lt;K&gt;
   ┌────┬────┬────┬────┐
   │ b0 │ b1 │ b2 │ b3 │   each bucket = linked list of entries with same hash
   └─┬──┴────┴─┬──┴────┘   lookup AVERAGE O(1), WORST O(n) (bad hash/collisions)
     ▼         ▼
   [k1,v1]   [k2,v2]→[k3,v3]
</code></pre>
<pre><code class="language-cpp">std::map&lt;std::string,int&gt; m;
m[&quot;a&quot;] = 1;                      // ⚠️ operator[] INSERTS a default if key absent!
m.at(&quot;a&quot;);                       // throws std::out_of_range if absent (no insert)
if (auto it = m.find(&quot;a&quot;); it != m.end()) use(it-&gt;second);
auto [it, inserted] = m.insert({&quot;b&quot;, 2});       // tells you if it was new
m.try_emplace(&quot;c&quot;, 3);           // C++17: construct value only if key is new
m.insert_or_assign(&quot;a&quot;, 9);      // C++17: upsert
</code></pre>
<p>🧠 <code>operator[]</code> on a map <strong>creates</strong> the element if missing (and requires V to be
default-constructible). Use <code>.at()</code>, <code>.find()</code>, or <code>.contains()</code> (C++20) for pure
lookup. For <code>unordered_*</code>, provide a good <code>std::hash</code> specialization for custom keys.</p>
<h3 id="container-adaptors">Container adaptors</h3>
<pre><code>   std::stack&lt;T&gt;     LIFO   (wraps deque by default)
   std::queue&lt;T&gt;     FIFO
   std::priority_queue&lt;T&gt;  max-heap by default (O(log n) push/pop, O(1) top)
</code></pre>
<hr />
<h2 id="104-iterators-categories--the-hierarchy">10.4 Iterators: categories &amp; the hierarchy</h2>
<pre><code>   INPUT        ──▶  read once, single-pass (istream_iterator)
   OUTPUT       ──▶  write once, single-pass (back_inserter, ostream_iterator)
   FORWARD      ──▶  read/write, multi-pass        (forward_list)
   BIDIRECTIONAL──▶  + can go backwards (--)        (list, map, set)
   RANDOM ACCESS──▶  + it+n, it[n], it1-it2, &lt; &gt;    (vector, deque, array)
   CONTIGUOUS   ──▶  (C++17) + elements are contiguous in memory (vector, array, string)

   capability increases ──────────────────────────────────────────────▶
   (each category supports everything the ones to its left support)
</code></pre>
<pre><code class="language-cpp">std::vector&lt;int&gt; v{1,2,3};
auto b = v.begin();   // iterator to first
auto e = v.end();     // ONE PAST the last (a sentinel; do not dereference)
*b;                   // 1
++b; b += 2;          // random access ops (vector only)
for (auto it = v.begin(); it != v.end(); ++it) use(*it);
</code></pre>
<pre><code>   [1][2][3]
    ▲        ▲
  begin()   end()  ← half-open range [begin, end); end is unreachable/sentinel
</code></pre>
<p>🧠 The half-open range <code>[begin, end)</code> is pervasive: <code>end - begin == size</code>, an empty
range is <code>begin == end</code>, and you never dereference <code>end()</code>. Reverse iterators
(<code>rbegin</code>/<code>rend</code>), <code>const_iterator</code> (<code>cbegin</code>/<code>cend</code>), and inserters
(<code>std::back_inserter(v)</code>) all plug into the same algorithm interface.</p>
<hr />
<h2 id="105-iterator--reference-invalidation--the-bug-source">10.5 Iterator &amp; reference invalidation 🧠 (the bug source)</h2>
<pre><code>   CONTAINER        operation                    invalidates
   ────────────────────────────────────────────────────────────────────────
   vector           push_back / insert (realloc) ALL iterators, pointers, refs
   vector           erase                        iterators/refs AT and AFTER point
   deque            insert/erase in middle       ALL
   deque            push/pop front/back          iterators (not refs to other elems)
   list/forward_list insert                      NONE
   list             erase                        only the erased iterator
   map/set (tree)   insert                       NONE
   map/set          erase                        only the erased iterator
   unordered_*      insert (rehash)              ALL iterators (refs/ptrs survive)
   unordered_*      erase                        only erased
</code></pre>
<p>⚠️ The classic crash:</p>
<pre><code class="language-cpp">for (auto it = v.begin(); it != v.end(); ++it)
    if (pred(*it)) v.erase(it);          // ⚠️ erase invalidates 'it' → UB
// FIX: erase returns the next valid iterator
for (auto it = v.begin(); it != v.end(); )
    it = pred(*it) ? v.erase(it) : it + 1;
// or, cleanest (C++20):
std::erase_if(v, pred);
</code></pre>
<p>⚠️ Holding a pointer/reference/iterator into a <code>vector</code> across a <code>push_back</code> that
reallocates is use-after-free.</p>
<hr />
<h2 id="106-algorithms--operate-on-ranges">10.6 Algorithms — operate on ranges</h2>
<pre><code class="language-cpp">#include &lt;algorithm&gt;
#include &lt;numeric&gt;
std::vector&lt;int&gt; v{5,3,1,4,2};

std::sort(v.begin(), v.end());                       // 1 2 3 4 5  (O(n log n))
std::sort(v.begin(), v.end(), std::greater&lt;&gt;{});     // 5 4 3 2 1  (custom comparator)
auto it = std::find(v.begin(), v.end(), 3);
bool any = std::any_of(v.begin(), v.end(), [](int x){ return x&gt;4; });
int sum  = std::accumulate(v.begin(), v.end(), 0);   // 15
std::transform(v.begin(), v.end(), v.begin(), [](int x){ return x*x; });
auto last = std::unique(v.begin(), v.end());         // dedupe ADJACENT (sort first!)
v.erase(last, v.end());                              // erase-remove idiom
std::for_each(v.begin(), v.end(), [](int x){ std::cout &lt;&lt; x; });
</code></pre>
<pre><code>   THE ERASE-REMOVE IDIOM (pre-C++20)
   std::remove shuffles &quot;kept&quot; elements to the front and returns the new logical end;
   it does NOT change the container size. You must erase the tail:
       v.erase(std::remove(v.begin(), v.end(), value), v.end());
   ┌──┬──┬──┬──┬──┐  remove 2  ┌──┬──┬──┬──┬──┐
   │1 │2 │3 │2 │4 │   ──────▶  │1 │3 │4 │? │? │   returns iterator here ─┘ then erase
   └──┴──┴──┴──┴──┘            └──┴──┴──┴──┴──┘
   C++20: just std::erase(v, value);  /  std::erase_if(v, pred);
</code></pre>
<p>🧠 <strong>Prefer algorithms over hand-written loops</strong> (&ldquo;no raw loops&rdquo;): they express
intent, are correct (off-by-one free), and are often optimized (vectorized). Many
have <strong>execution policies</strong> (C++17) for parallelism:
<code>std::sort(std::execution::par, b, e);</code>.</p>
<p>Algorithm families: searching (<code>find</code>, <code>binary_search</code>, <code>lower_bound</code>),
modifying (<code>copy</code>, <code>transform</code>, <code>fill</code>, <code>replace</code>), partitioning (<code>partition</code>,
<code>stable_partition</code>), sorting (<code>sort</code>, <code>stable_sort</code>, <code>nth_element</code>,
<code>partial_sort</code>), set ops (<code>set_union</code>, <code>set_intersection</code>), heap ops, numeric
(<code>accumulate</code>, <code>reduce</code>, <code>inner_product</code>, <code>iota</code>, <code>partial_sum</code>).</p>
<hr />
<h2 id="107-function-objects-predicates--projections">10.7 Function objects, predicates &amp; projections</h2>
<pre><code class="language-cpp">std::sort(v.begin(), v.end(),
          [](const auto&amp; a, const auto&amp; b){ return a.score &gt; b.score; });  // comparator

std::count_if(v.begin(), v.end(), [](int x){ return x % 2 == 0; });        // predicate

// standard functors
std::less&lt;&gt;{}, std::greater&lt;&gt;{}, std::plus&lt;&gt;{}   // transparent (heterogeneous) since C++14
</code></pre>
<hr />
<h2 id="108-allocators-awareness-level">10.8 Allocators (awareness level)</h2>
<p>Every container has an <code>Allocator</code> template parameter controlling how it gets raw
memory. <code>std::pmr</code> (C++17, polymorphic memory resources) lets you swap allocation
strategy (e.g. a stack/monotonic arena) at runtime without changing the type:</p>
<pre><code class="language-cpp">#include &lt;memory_resource&gt;
std::array&lt;std::byte, 4096&gt; buf;
std::pmr::monotonic_buffer_resource pool{buf.data(), buf.size()};
std::pmr::vector&lt;int&gt; v{&amp;pool};   // allocates from the stack buffer — no heap calls
</code></pre>
<p>🧠 Custom allocators matter for latency-sensitive/embedded code (avoid <code>malloc</code>,
control fragmentation). For most code the default allocator is fine.</p>
<hr />
<h2 id="109-choosing-a-container--decision-flow">10.9 Choosing a container — decision flow</h2>
<pre><code>   Need key→value lookup?
     yes → need ordering / range queries?  yes → std::map / std::set
                                            no  → std::unordered_map / _set (faster avg)
     no  → mostly append + index + iterate? → std::vector (DEFAULT)
           heavy insert/erase at BOTH ends?  → std::deque
           heavy splice / stable iterators / insert-erase in middle? → std::list
           fixed compile-time size?          → std::array
           LIFO/FIFO/priority semantics?     → stack / queue / priority_queue
</code></pre>
<hr />
<h2 id="1010-stdspan-c20--a-non-owning-view-over-contiguous-data">10.10 <code>std::span</code> (C++20) — a non-owning view over contiguous data</h2>
<pre><code class="language-cpp">void process(std::span&lt;int&gt; data) {       // accepts vector, array, C array — no copy
    for (int&amp; x : data) x *= 2;
    data.size(); data[0]; data.subspan(1, 3);
}
std::vector&lt;int&gt; v{1,2,3}; process(v);
int a[4]{}; process(a);
</code></pre>
<p>🧠 <code>span</code> is to arrays what <code>string_view</code> is to strings: a <code>{pointer, length}</code> pair
that unifies APIs over any contiguous storage — but it does <strong>not</strong> own and can
dangle if the underlying data dies.</p>
<hr />
<h2 id="1011-checklist">10.11 Checklist</h2>

<li class="task-list-item"><input type="checkbox" disabled> You default to <code>vector</code>, and pick others only with a complexity reason.</li>
<li class="task-list-item"><input type="checkbox" disabled> You know each container&rsquo;s lookup/insert/erase complexity by heart.</li>
<li class="task-list-item"><input type="checkbox" disabled> You know the invalidation rules and avoid the erase-in-loop trap.</li>
<li class="task-list-item"><input type="checkbox" disabled> You prefer algorithms (and <code>erase_if</code>, ranges) over raw loops.</li>

</ul>

<blockquote>
<p>Smart pointers apply RAII (Module 05) to dynamic memory: they own a heap object
and free it automatically. They encode <strong>ownership</strong> in the type system, which
is the modern C++ answer to leaks, double-frees, and dangling pointers.
<code>[Primer §12.1]</code></p>
</blockquote>
<hr />
<h2 id="111-the-ownership-question">11.1 The ownership question</h2>
<p>Every pointer in a codebase should answer: <strong>&ldquo;Who owns this? Who frees it?&rdquo;</strong></p>
<pre><code>   OWNERSHIP MODEL          USE                         TOOL
   ───────────────────────────────────────────────────────────────────────
   unique ownership         one owner, transferable     std::unique_ptr&lt;T&gt;
   shared ownership         many owners, last frees      std::shared_ptr&lt;T&gt;
   non-owning observation   &quot;I just look, don't free&quot;    raw T* / T&amp; / std::weak_ptr / span
</code></pre>
<p>🧠 Guideline: <strong>Owning = smart pointer or container. Non-owning = raw pointer/
reference.</strong> A raw pointer in modern C++ means &ldquo;I observe but do not own.&rdquo; Never
<code>delete</code> a raw pointer you received — if you didn&rsquo;t <code>new</code> it, it&rsquo;s not yours.</p>
<hr />
<h2 id="112-stdunique_ptr--exclusive-ownership-zero-overhead">11.2 <code>std::unique_ptr</code> — exclusive ownership, zero overhead</h2>
<pre><code class="language-cpp">#include &lt;memory&gt;
auto p = std::make_unique&lt;Widget&gt;(args);   // ← PREFER make_unique (no raw new)
p-&gt;method();
*p;                          // deref
Widget* raw = p.get();       // borrow (non-owning) — do NOT delete it
p.reset();                   // free now, p becomes null
Widget* released = p.release(); // give up ownership; YOU must delete now
// when p goes out of scope, ~unique_ptr deletes the Widget automatically
</code></pre>
<pre><code>   unique_ptr&lt;Widget&gt;            sizeof == sizeof(Widget*)  (with default deleter)
   ┌──────────────┐             ZERO runtime overhead vs raw pointer.
   │ ptr ─────────┼──────▶ [ Widget on heap ]
   └──────────────┘             Move-only: cannot be COPIED (copy is =deleted),
                                only MOVED — which transfers ownership.
</code></pre>
<pre><code class="language-cpp">std::unique_ptr&lt;Widget&gt; a = std::make_unique&lt;Widget&gt;();
// std::unique_ptr&lt;Widget&gt; b = a;            // ❌ copy deleted
std::unique_ptr&lt;Widget&gt; b = std::move(a);    // ✅ ownership transferred; a is now null
</code></pre>
<p>Use cases: factory return types, PIMPL, owning members, the body of a container of
polymorphic objects (<code>std::vector&lt;std::unique_ptr&lt;Base&gt;&gt;</code>).</p>
<p>Custom deleter (e.g. for C resources):</p>
<pre><code class="language-cpp">auto closer = [](std::FILE* f){ if (f) std::fclose(f); };
std::unique_ptr&lt;std::FILE, decltype(closer)&gt; file{std::fopen(&quot;x&quot;,&quot;r&quot;), closer};
// arrays:
auto arr = std::make_unique&lt;int[]&gt;(100);   // unique_ptr&lt;int[]&gt; — uses delete[]
</code></pre>
<hr />
<h2 id="113-stdshared_ptr--shared-ownership-via-reference-counting">11.3 <code>std::shared_ptr</code> — shared ownership via reference counting</h2>
<pre><code class="language-cpp">auto sp = std::make_shared&lt;Widget&gt;(args);   // ← PREFER make_shared
auto sp2 = sp;                               // COPY: refcount now 2
sp.use_count();                              // 2
// last shared_ptr destroyed ⇒ Widget deleted
</code></pre>
<pre><code>   shared_ptr layout (the CONTROL BLOCK is the key):
   sp  ┌──────────┐        ┌──── control block ──────┐
       │ ptr ─────┼──────▶ [ Widget object           ]        
       │ ctrl ────┼──────▶ │ strong count : 2        │
       └──────────┘        │ weak count   : 0        │
   sp2 ┌──────────┐        │ deleter / allocator     │
       │ ptr ─────┼──────▶ └─────────────────────────┘
       │ ctrl ────┼──────▶ (same control block)
       └──────────┘
   • strong count hits 0 → object destroyed
   • weak count + strong both 0 → control block freed
</code></pre>
<p>🧠 <strong>Why <code>make_shared</code>?</strong> It allocates the object <strong>and</strong> the control block in a
<strong>single</strong> allocation (faster, one cache line, better locality). Plain
<code>shared_ptr&lt;T&gt;(new T)</code> does two allocations and is less exception-safe.</p>
<p>⚠️ Costs of <code>shared_ptr</code>:</p>
<ul>
<li>2× pointer size (object ptr + control-block ptr).</li>
<li>
<p><strong>Atomic</strong> refcount increment/decrement (thread-safe count, but <em>not</em> the
  pointee) → cache-line contention if shared across threads.</p>
</li>
<li>
<p>Don&rsquo;t pass <code>shared_ptr</code> by value everywhere — each copy is an atomic op. Pass
  <code>const shared_ptr&amp;</code>, or better, pass <code>T&amp;</code>/<code>T*</code> if the callee doesn&rsquo;t keep it.</p>
</li>
</ul>
<hr />
<h2 id="114-the-cycle-problem--stdweak_ptr-">11.4 The cycle problem &amp; <code>std::weak_ptr</code> 🧠</h2>
<pre><code class="language-cpp">struct Node {
    std::shared_ptr&lt;Node&gt; next;   // ⚠️ if these form a cycle, refcount never hits 0 → LEAK
};
</code></pre>
<pre><code>   CYCLE: A.next → B,  B.next → A
   A(count=1 from B) ⇄ B(count=1 from A)
   Drop external refs → each still has count 1 → NEITHER freed → LEAK.

   FIX: make ONE direction a weak_ptr (a non-owning observer that doesn't bump count)
   parent → child : shared_ptr (owns)
   child  → parent: weak_ptr  (observes)
</code></pre>
<pre><code class="language-cpp">struct Tree {
    std::vector&lt;std::shared_ptr&lt;Tree&gt;&gt; children;
    std::weak_ptr&lt;Tree&gt; parent;        // ✅ breaks the cycle
};

std::weak_ptr&lt;Widget&gt; w = sp;          // does NOT increase strong count
if (auto locked = w.lock()) {          // promote to shared_ptr IF still alive
    locked-&gt;use();                     // safe: object guaranteed alive in this block
} else {
    // object already destroyed
}
w.expired();                            // true if the object is gone
</code></pre>
<p><code>weak_ptr</code> is also the standard tool for <strong>caches</strong> and <strong>observer</strong> patterns
where you must not keep the object alive but must detect its death.</p>
<hr />
<h2 id="115-enable_shared_from_this">11.5 <code>enable_shared_from_this</code></h2>
<p>To hand out a <code>shared_ptr</code> to <code>this</code> from inside a member (without creating a
<em>second</em>, independent control block — which would double-free):</p>
<pre><code class="language-cpp">class Session : public std::enable_shared_from_this&lt;Session&gt; {
public:
    void start() {
        auto self = shared_from_this();   // ✅ shares the EXISTING control block
        asyncOp([self]{ self-&gt;onDone(); });// keep alive during async op
    }
};
auto s = std::make_shared&lt;Session&gt;();     // ⚠️ object MUST already be owned by a shared_ptr
s-&gt;start();
</code></pre>
<p>⚠️ Calling <code>shared_from_this()</code> on an object <strong>not</strong> owned by a <code>shared_ptr</code> is UB
(throws <code>std::bad_weak_ptr</code> in practice).</p>
<hr />
<h2 id="116-passing-smart-pointers--the-parameter-guidelines-">11.6 Passing smart pointers — the parameter guidelines 🧠</h2>
<pre><code>   FUNCTION INTENT                         PARAMETER TYPE
   ──────────────────────────────────────────────────────────────────────
   &quot;I just use the object&quot; (no ownership)  Widget&amp;  or  const Widget&amp;   (or Widget*)
   &quot;I take ownership (a sink)&quot;             std::unique_ptr&lt;Widget&gt;      (by value)
   &quot;I may share ownership / keep it&quot;       std::shared_ptr&lt;Widget&gt;      (by value)
   &quot;I observe shared ownership&quot;            const std::shared_ptr&lt;Widget&gt;&amp;  (avoid copy)
   &quot;I conditionally extend lifetime&quot;       std::weak_ptr&lt;Widget&gt;
</code></pre>
<p>⚠️ Anti-pattern: taking <code>const std::unique_ptr&lt;T&gt;&amp;</code> or <code>const std::shared_ptr&lt;T&gt;&amp;</code>
just to call methods. If you don&rsquo;t manage ownership, take <code>T&amp;</code>/<code>T*</code> — it decouples
the callee from the ownership scheme.</p>
<hr />
<h2 id="117-raii-beyond-memory">11.7 RAII beyond memory</h2>
<p>Smart pointers are one instance of RAII. The same pattern wraps every resource:</p>
<pre><code class="language-cpp">{
    std::lock_guard&lt;std::mutex&gt; lk(m);   // acquires mutex; releases on scope exit
    std::ifstream file(&quot;data.txt&quot;);      // closes on scope exit
    std::unique_ptr&lt;Conn&gt; c = connect(); // disconnects on scope exit
    // ... use them ...
}   // released in REVERSE order, even if an exception is thrown
</code></pre>
<p>Write your own scope-guard for ad-hoc cleanup:</p>
<pre><code class="language-cpp">template&lt;class F&gt;
struct ScopeGuard {
    F f; bool active = true;
    ~ScopeGuard(){ if (active) f(); }
    void dismiss(){ active = false; }
};
auto guard = ScopeGuard{[&amp;]{ rollback(); }};   // runs rollback unless we dismiss()
commit();
guard.dismiss();   // success: don't roll back
</code></pre>
<p>(<code>std::experimental::scope_exit</code> / Boost.ScopeExit / <code>gsl::finally</code> formalize this.)</p>
<hr />
<h2 id="118-decision-diagram">11.8 Decision diagram</h2>
<pre><code>   Do you need a heap object with managed lifetime?
     no  → use a value/stack object or a container (best)
     yes → is ownership shared among independent parties with no clear single owner?
             no  → std::unique_ptr   (default; cheap, clear)
             yes → std::shared_ptr   (+ std::weak_ptr to break cycles / observe)
   Need to OBSERVE without owning? → raw pointer / reference / span / weak_ptr
</code></pre>
<hr />
<h2 id="119-common-mistakes">11.9 Common mistakes</h2>
<pre><code>   ⚠️ new/delete by hand                → use make_unique/make_shared
   ⚠️ shared_ptr where unique_ptr fits  → unnecessary atomic overhead
   ⚠️ two shared_ptr from one raw new   → two control blocks → double free
        shared_ptr&lt;T&gt; a(raw); shared_ptr&lt;T&gt; b(raw);   // ❌
   ⚠️ shared_ptr cycles                 → use weak_ptr for back-references
   ⚠️ passing shared_ptr by value in hot paths → atomic refcount churn
   ⚠️ get()/release() then forgetting who deletes
</code></pre>
<hr />
<h2 id="1110-checklist">11.10 Checklist</h2>
<ul>
<li class="task-list-item"><input type="checkbox" disabled> Every owning pointer is a smart pointer or container; raw = non-owning.</li>
<li class="task-list-item"><input type="checkbox" disabled> You default to <code>unique_ptr</code>; you use <code>shared_ptr</code> only for true shared ownership.</li>
<li class="task-list-item"><input type="checkbox" disabled> You always use <code>make_unique</code>/<code>make_shared</code>.</li>
<li class="task-list-item"><input type="checkbox" disabled> You break shared_ptr cycles with <code>weak_ptr</code>.</li>
<li class="task-list-item"><input type="checkbox" disabled> You pass <code>T&amp;</code>/<code>T*</code> when a function only <em>uses</em> an object.</li>
<li class="task-list-item"><input type="checkbox" disabled> You wrap every resource (locks, files, handles) in RAII.</li>
</ul>
