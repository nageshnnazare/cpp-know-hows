<h2 id="51-struct-vs-class-and-access-control">5.1 struct vs class and access control</h2>
<p>The <strong>only</strong> language difference: default member access <strong>and</strong> default
inheritance access.</p>
<pre><code class="language-cpp">struct S { int x; };     // members public by default;  struct D : Base → public Base
class  C { int x; };     // members private by default;  class  D : Base → private Base
</code></pre>
<pre><code>   ACCESS SPECIFIERS               applies to members AND base-class subobjects
   public:     anyone                         (the interface)
   protected:  this class + derived classes
   private:    this class + its friends only  (the implementation / invariant)
</code></pre>
<p>🧠 Encapsulation exists to protect <strong>invariants</strong>. If a type has no invariant, a
<code>struct</code> (all public) is appropriate. Access is checked at compile time and is
about <em>names</em>, not memory — a <code>private</code> member still occupies object storage and is
visible to <code>friend</code>s.</p>
<hr />
<h2 id="52-object-layout--this">5.2 Object layout &amp; <code>this</code></h2>
<pre><code>   class Point { int x; int y; void move(int,int); };
   Point p;
   ┌──────── object p (sizeof == 8)  ────────┐
   │  x : int (4B)  │  y : int (4B)          │
   └─────────────────────────────────────────┘
   p.move(1,2)   ≡   Point::move(&amp;p, 1, 2)
                                  ▲ implicit 'this' (Point* const; const Point* in const member)
</code></pre>
<ul>
<li>
<p>Non-static member functions receive an implicit <code>this</code> pointer (C++23 lets you
  name it explicitly — §5.8 &ldquo;deducing this&rdquo;).</p>
</li>
<li>
<p>Data members are laid out in <strong>declaration order</strong> (with padding); members with
  the same access are guaranteed in order. Member functions cost <strong>no</strong> per-object
  space (only one copy of the code).</p>
</li>
<li>
<p><code>static</code> data members and member functions have <strong>no</strong> <code>this</code>.</p>
</li>
</ul>
<hr />
<h2 id="53-the-complete-constructor-catalog">5.3 The complete constructor catalog</h2>
<p>A constructor initializes an object&rsquo;s members and establishes its invariant. Here
is <strong>every</strong> kind.</p>
<h3 id="1-default-constructor--t">(1) Default constructor — <code>T()</code></h3>
<pre><code class="language-cpp">class T {
public:
    T();                 // user-provided default ctor
    T() = default;       // explicitly defaulted (compiler generates it)
    T() = delete;        // no default ctor (T() is ill-formed)
    constexpr T();       // usable in constant expressions
    T() noexcept;        // promises not to throw
};
</code></pre>
<pre><code>   • IMPLICITLY declared &amp; defined if you declare NO constructors at all.
   • SUPPRESSED the moment you declare ANY other constructor (add T()=default to get it back).
   • TRIVIAL default ctor: implicitly defined, members are built-in/trivial,
     no virtual, no base init → does NOTHING (leaves members uninitialized!).
   • value-init  T()  vs default-init  T t;  differ for trivial types (Appendix A).
</code></pre>
<h3 id="2-parameterized-constructor">(2) Parameterized constructor</h3>
<pre><code class="language-cpp">class Rectangle {
    double w_, h_;
public:
    Rectangle(double w, double h) : w_(w), h_(h) {}
};
</code></pre>
<h3 id="3-converting-constructor-implicit-vs-explicit">(3) Converting constructor (implicit) vs <code>explicit</code></h3>
<pre><code class="language-cpp">struct A { A(int); };            // CONVERTING: enables implicit int → A
struct B { explicit B(int); };   // explicit: no implicit conversion

void fa(A); void fb(B);
fa(5);            // ✅ implicit 5 → A
// fb(5);         // ❌ explicit
fb(B{5});         // ✅
</code></pre>
<p>A constructor callable with a <strong>single</strong> argument (or all-but-one defaulted)
defines an implicit conversion <strong>unless</strong> marked <code>explicit</code>.</p>
<pre><code class="language-cpp">// C++20 conditional explicit:
template&lt;class T&gt;
struct Wrapper {
    explicit(!std::is_convertible_v&lt;T, int&gt;) Wrapper(T);  // explicit only sometimes
};
</code></pre>
<p>🧠 <strong>Default to <code>explicit</code></strong> on single-argument constructors. <code>explicit</code> also
suppresses copy-list-initialization: <code>A a = {5};</code> is rejected for an <code>explicit</code> ctor.</p>
<h3 id="4-copy-constructor--tconst-t">(4) Copy constructor — <code>T(const T&amp;)</code></h3>
<pre><code class="language-cpp">class T {
public:
    T(const T&amp;);              // canonical copy ctor
    T(T&amp;);                    // legal but rare (can't copy const/temporaries)
    T(const volatile T&amp;);     // legal; needed only for volatile sources
    T(const T&amp;) = default;    // request the implicit memberwise copy
    T(const T&amp;) = delete;     // non-copyable type (e.g. unique ownership)
};
</code></pre>
<pre><code>   A copy constructor has a first parameter of type  T&amp; / const T&amp; / volatile T&amp; /
   const volatile T&amp;  AND no other params (or the rest defaulted).
   ⚠️ T(T) (by value) is NOT a copy ctor — it's ill-formed (infinite copy).
   The implicit copy ctor does MEMBERWISE copy (copies each base &amp; member).
</code></pre>
<h3 id="5-move-constructor--tt">(5) Move constructor — <code>T(T&amp;&amp;)</code></h3>
<pre><code class="language-cpp">class T {
public:
    T(T&amp;&amp;) noexcept;          // canonical move ctor — ALWAYS mark noexcept (Module 06)
    T(T&amp;&amp;) = default;
    T(T&amp;&amp;) = delete;          // move-disabled (rare)
};
</code></pre>
<pre><code>   First parameter is an rvalue reference  T&amp;&amp;  (no other non-defaulted params).
   Leaves the source in a VALID BUT UNSPECIFIED state. noexcept matters: vector
   uses moves only if the move ctor is noexcept (else it copies). See Module 06.
</code></pre>
<h3 id="6-delegating-constructor-c11">(6) Delegating constructor (C++11)</h3>
<pre><code class="language-cpp">class Widget {
    int id_; std::string name_;
public:
    Widget(int id, std::string name) : id_(id), name_(std::move(name)) {}  // target
    Widget()           : Widget(0, &quot;unnamed&quot;) {}        // delegates to the target ctor
    Widget(int id)     : Widget(id, &quot;unnamed&quot;) {}       // delegates
};
</code></pre>
<pre><code>   A constructor may delegate to ANOTHER constructor of the SAME class in its
   member-init list (and ONLY that — you can't also init members in the same list).
   ⚠️ A cycle of delegations is undefined behavior.
   The target ctor runs fully (members constructed) before the delegating body.
</code></pre>
<h3 id="7-inheriting-constructors-c11--using-basebase">(7) Inheriting constructors (C++11) — <code>using Base::Base;</code></h3>
<pre><code class="language-cpp">struct Base { Base(int); Base(int, int); Base(const std::string&amp;); };
struct Derived : Base {
    using Base::Base;       // inherit ALL of Base's constructors
    int extra_ = 0;         // gets its default member initializer
};
Derived d{42};              // calls the inherited Base(int); extra_ = 0
</code></pre>
<pre><code>   'using Base::Base;' makes Base's constructors usable to construct Derived
   (Derived's own members use their default member initializers).
   ⚠️ Does not inherit default/copy/move ctors; if Derived adds members WITHOUT
   default initializers, those would be uninitialized — give them = {} defaults.
</code></pre>
<h3 id="8-stdinitializer_list-constructor">(8) <code>std::initializer_list</code> constructor</h3>
<pre><code class="language-cpp">#include &lt;initializer_list&gt;
class Seq {
    std::vector&lt;int&gt; data_;
public:
    Seq(std::initializer_list&lt;int&gt; il) : data_(il) {}   // braced-list ctor
    Seq(std::size_t n, int value);                       // &quot;n copies&quot; ctor
};
Seq a{1, 2, 3};      // ⟶ initializer_list ctor: {1,2,3}
Seq b(3, 7);         // ⟶ (n,value) ctor: 3 sevens
Seq c{3, 7};         // ⚠️ initializer_list WINS over (n,value): elements {3,7}
</code></pre>
<pre><code>   🧠 BRACE INITIALIZATION STRONGLY PREFERS an initializer_list constructor if one
   is viable — even over a &quot;better&quot; matching constructor. This is THE vector{5} vs
   vector(5) trap (Module 16). Use () when you want a non-list constructor.
</code></pre>
<h3 id="9-constexpr--consteval-constructor">(9) <code>constexpr</code> / <code>consteval</code> constructor</h3>
<pre><code class="language-cpp">struct Point {
    int x, y;
    constexpr Point(int x, int y) : x(x), y(y) {}   // usable at compile time
};
constexpr Point origin{0, 0};                        // built at compile time
</code></pre>
<p>A <code>constexpr</code> constructor lets objects be constructed in constant expressions
(literal types). <code>consteval</code> ctors (C++20) must run at compile time.</p>
<h3 id="10-defaulted--deleted-constructors">(10) Defaulted &amp; deleted constructors</h3>
<pre><code class="language-cpp">struct T {
    T() = default;                 // generate the trivial/implicit one
    T(const T&amp;) = delete;          // ban copying
    T(int) = delete;               // ban a specific overload (also useful on free fns)
};
</code></pre>
<p><code>= default</code> can be <strong>in-class</strong> or <strong>out-of-line</strong> (<code>T::T() = default;</code> in the
<code>.cpp</code>, which can change triviality/ABI). <code>= delete</code> makes any use a compile error.</p>
<h3 id="11-aggregate-no-constructor--see-512">(11) Aggregate (no constructor) — see §5.12</h3>
<h3 id="12-templated--perfect-forwarding-constructor-and-its-trap">(12) Templated / perfect-forwarding constructor (and its trap)</h3>
<pre><code class="language-cpp">class S {
    std::string s_;
public:
    template&lt;class T&gt;
    explicit S(T&amp;&amp; x) : s_(std::forward&lt;T&gt;(x)) {}   // ⚠️ greedy forwarding ctor
    S(const S&amp;);                                     // copy ctor
};
// ⚠️ S a; S b{a};  may call the TEMPLATE (T=S&amp;) instead of the copy ctor for
//    a non-const lvalue, because T&amp;&amp; is an exact match. Constrain it:
//    template&lt;class T&gt; requires (!std::is_same_v&lt;std::decay_t&lt;T&gt;, S&gt;) S(T&amp;&amp;);
</code></pre>
<p>🧠 A forwarding constructor <code>template&lt;class T&gt; S(T&amp;&amp;)</code> is a near-universal match
and can <strong>hijack</strong> copy/move. Constrain it with a concept/<code>enable_if</code> excluding
<code>S</code> itself. This is a famous expert gotcha (Scott Meyers, <em>Effective Modern C++</em> Item 26–27).</p>
<h3 id="triviality-literal-types-pod-terminology">Triviality, literal types, POD (terminology)</h3>
<pre><code>   TRIVIAL ctor:        implicitly provided, no work (no base/member init, no virtual).
   TRIVIALLY COPYABLE:  can be copied with memcpy (no user copy/move/dtor; trivial ones).
   STANDARD-LAYOUT:     C-compatible layout (no mixed access, no virtual, etc.).
   POD (deprecated term)= trivial + standard-layout.
   LITERAL TYPE:        usable in constexpr (constexpr ctor, trivial dtor, ...).
   Check with: std::is_trivial_v, std::is_trivially_copyable_v, std::is_standard_layout_v.
</code></pre>
<hr />
<h2 id="54-member-initializer-lists--the-full-rules">5.4 Member initializer lists — the full rules</h2>
<pre><code class="language-cpp">class Widget {
    const int   id_;        // const     → MUST be in init list
    std::string name_;
    int&amp;        ref_;       // reference → MUST be in init list
    Gadget      g_;         // no default ctor → MUST be in init list
public:
    Widget(int id, std::string n, int&amp; r)
        : id_(id),                 // direct-initialize each member
          name_(std::move(n)),
          ref_(r),
          g_(id)                   // construct g_ with id
    { /* body: all members already constructed */ }
};
</code></pre>
<pre><code>   ❌ assignment in body                ✅ member initializer list
   Widget(int id){ id_ = id; }          Widget(int id) : id_(id) {}
   (member is default-constructed       (member is DIRECT-initialized once;
    THEN assigned ⇒ two ops; and         works for const, references, and
    impossible for const/ref/no-default) types without a default ctor)
</code></pre>
<p><strong>Rules an expert must know:</strong></p>
<ol>
<li><strong>Initialization order is DECLARATION order</strong>, NOT the order written in the
   list. The compiler reorders to declaration order; <code>-Wreorder</code> warns.</li>
</ol>
<p><code>cpp
   class C { int a; int b;
   public: C(int x) : b(x), a(b) {} };  // ⚠️ a init FIRST (declared first) using uninit b!</code></p>
<ol start="2">
<li>
<p><strong>You MUST use the init list for</strong>: <code>const</code> members, reference members, members
   of a type with no accessible default constructor, and base-class subobjects
   needing non-default construction.</p>
</li>
<li>
<p><strong>Default member initializers</strong> (C++11) provide a fallback; the init list overrides.</p>
</li>
</ol>
<p><code>cpp
   class Config {
       int retries_ = 3;                 // default member initializer
       std::string host_ = "localhost";
   public:
       Config() = default;               // uses defaults
       Config(int r) : retries_(r) {}    // overrides retries_ only
   };</code></p>
<ol start="4">
<li>
<p>Bases are initialized <strong>before</strong> members (§5.7), regardless of list order.</p>
</li>
<li>
<p>A delegating constructor (§5.3-6) may <strong>not</strong> also list members.</p>
</li>
</ol>
<hr />
<h2 id="55-the-complete-destructor-catalog">5.5 The complete destructor catalog</h2>
<p>A destructor releases resources when an object&rsquo;s lifetime ends. Exactly <strong>one</strong>
destructor per class (no overloading, no parameters).</p>
<h3 id="1-default--trivial-destructor">(1) Default / trivial destructor</h3>
<pre><code class="language-cpp">class T { public: ~T() = default; };   // or implicitly provided if none declared
</code></pre>
<pre><code>   TRIVIAL destructor: implicitly provided, all members/bases trivially destructible,
   not virtual → does nothing. Enables memcpy-style relocation, literal types.
</code></pre>
<h3 id="2-user-defined-destructor">(2) User-defined destructor</h3>
<pre><code class="language-cpp">class File {
    std::FILE* f_;
public:
    ~File() { if (f_) std::fclose(f_); }   // release the resource
};
</code></pre>
<h3 id="3-virtual-destructor">(3) Virtual destructor</h3>
<pre><code class="language-cpp">class Base { public: virtual ~Base() = default; };  // REQUIRED for polymorphic deletion
class Derived : public Base { Big data_; };
Base* p = new Derived;
delete p;   // ✅ runs ~Derived then ~Base, because ~Base is virtual
</code></pre>
<pre><code>   RULE (Core Guidelines C.35): a base class destructor is either
     • PUBLIC and VIRTUAL    (you delete through Base*), or
     • PROTECTED and NON-virtual (you cannot delete through Base* — prevents the bug).
   ⚠️ Non-virtual base dtor + delete via Base* = UB (only ~Base runs → slice/leak).
</code></pre>
<h3 id="4-pure-virtual-destructor-with-a-definition">(4) Pure virtual destructor (with a definition)</h3>
<pre><code class="language-cpp">class AbstractBase {
public:
    virtual ~AbstractBase() = 0;          // pure ⇒ class is abstract
};
AbstractBase::~AbstractBase() {}          // ⚠️ MUST still provide a body (called by derived dtors)
</code></pre>
<p>A pure virtual destructor makes a class abstract while still being invoked during
derived destruction — hence it <strong>needs a definition</strong>.</p>
<h3 id="5-defaulted--deleted-destructor">(5) Defaulted / deleted destructor</h3>
<pre><code class="language-cpp">class T { public: ~T() = default; };   // explicit default
class U { public: ~U() = delete; };    // cannot be destroyed (only via placement/leak; rare)
</code></pre>
<h3 id="6-constexpr-destructor-c20">(6) <code>constexpr</code> destructor (C++20)</h3>
<pre><code class="language-cpp">struct Lit { constexpr ~Lit() {} };    // enables constexpr objects with non-trivial dtors
</code></pre>
<h3 id="7-noexcept-nature">(7) <code>noexcept</code> nature</h3>
<pre><code>   Destructors are IMPLICITLY noexcept(true). A destructor that throws during
   stack unwinding (another exception in flight) ⇒ std::terminate(). NEVER throw
   from a destructor (Module 13). To allow throwing (don't): ~T() noexcept(false).
</code></pre>
<pre><code>   DESTRUCTOR FACTS:
   • exactly one per class; no params; no return; cannot be overloaded.
   • runs members in REVERSE declaration order, then bases in reverse (§5.7).
   • virtual if any base's dtor is virtual.
   • calling delete on a base* needs the base dtor virtual.
   • explicit call p-&gt;~T() is legal (used with placement new, Module 03).
</code></pre>
<hr />
<h2 id="56-the-complete-assignment-operator-catalog">5.6 The complete assignment-operator catalog</h2>
<p>(Detailed semantics in <a href="06_copy_move_semantics.md">Module 06</a>; here is the <em>signature</em> reference.)</p>
<pre><code class="language-cpp">class T {
public:
    // (1) copy assignment — canonical forms
    T&amp; operator=(const T&amp;);            // standard
    T&amp; operator=(T);                   // copy-and-swap (by value) — covers copy AND move
    T&amp; operator=(T&amp;);                  // legal, rare

    // (2) move assignment
    T&amp; operator=(T&amp;&amp;) noexcept;

    // (3) defaulted / deleted
    T&amp; operator=(const T&amp;) = default;  // memberwise copy assign
    T&amp; operator=(T&amp;&amp;)      = default;  // memberwise move assign
    T&amp; operator=(const T&amp;) = delete;   // non-assignable

    // (4) ref-qualified (restrict assignable value category)
    T&amp; operator=(const T&amp;) &amp;;          // only to lvalues: a = b ok; f() = b ERROR
    T&amp; operator=(const T&amp;) &amp;&amp; = delete;

    // (5) templated / heterogeneous assignment (NOT a special member)
    template&lt;class U&gt; T&amp; operator=(const U&amp;);
    T&amp; operator=(std::initializer_list&lt;int&gt;);   // assign from a braced list
};
</code></pre>
<pre><code>   RETURN T&amp; to *this (enables a = b = c). Handle SELF-ASSIGNMENT (copy-and-swap
   does automatically). The implicit copy/move assignment does memberwise assign.
   ⚠️ Declaring a copy/move assignment affects what else is auto-generated (§5.9).
</code></pre>
<hr />
<h2 id="57-the-full-constructiondestruction-order">5.7 The full construction/destruction order</h2>
<pre><code>   Constructing a Derived object proceeds STRICTLY in this order:
   1. VIRTUAL base classes   (once, by the most-derived class, in DFS-left-to-right order)
   2. DIRECT non-virtual bases   (in declaration order of the base list)
   3. NON-STATIC data members    (in DECLARATION order — NOT init-list order)
   4. the constructor BODY { }

   Destruction is the EXACT REVERSE:
   1. the destructor body { }
   2. members destroyed in REVERSE declaration order
   3. non-virtual bases in reverse
   4. virtual bases in reverse
</code></pre>
<pre><code class="language-cpp">struct A { A(){std::puts(&quot;A&quot;);} ~A(){std::puts(&quot;~A&quot;);} };
struct B { B(){std::puts(&quot;B&quot;);} ~B(){std::puts(&quot;~B&quot;);} };
struct Base { Base(){std::puts(&quot;Base&quot;);} ~Base(){std::puts(&quot;~Base&quot;);} };
struct C : Base {
    A a;   // declared 1st
    B b;   // declared 2nd
    C(){std::puts(&quot;C body&quot;);}
    ~C(){std::puts(&quot;~C body&quot;);}
};
// Construct order: Base, A, B, &quot;C body&quot;
// Destruct order : &quot;~C body&quot;, ~B, ~A, ~Base
</code></pre>
<p>🧠 <strong>Virtual calls during construction/destruction resolve to the
currently-constructing type</strong>, not the most-derived type — the derived part
doesn&rsquo;t exist yet (or has already been destroyed). Never expect dynamic dispatch
from a ctor/dtor (Module 16 §16.8).</p>
<hr />
<h2 id="58-member-function-qualifiers--complete-reference">5.8 Member-function qualifiers — complete reference</h2>
<p>A non-static member function can carry many qualifiers. Full grammar:</p>
<pre><code>   return-type  Class::name (params)  cv-qual  ref-qual  noexcept-spec  virt-spec  trailing-return  body/=default/=delete/=0
                                        │        │         │              │
   const/volatile ──────────────────────┘        │         │              └ override / final
   &amp; / &amp;&amp; (lvalue/rvalue) ───────────────────────┘         └ noexcept / noexcept(expr)
</code></pre>
<h3 id="cv-qualifiers-const--volatile">cv-qualifiers: <code>const</code> / <code>volatile</code></h3>
<pre><code class="language-cpp">class T {
    mutable int cache_;
public:
    int  get() const;          // 'this' is const T* → cannot modify (except mutable members)
    void set(int);             // non-const → may modify
    int  poll() volatile;      // for volatile objects (memory-mapped I/O) — rare
};
</code></pre>
<pre><code>   const and non-const member functions OVERLOAD (the compiler picks based on the
   object's constness):
     int&amp;       at(size_t i);        // chosen for non-const object
     const int&amp; at(size_t i) const;  // chosen for const object
   A const object can ONLY call const member functions.
</code></pre>
<h3 id="ref-qualifiers---">ref-qualifiers: <code>&amp;</code> / <code>&amp;&amp;</code></h3>
<pre><code class="language-cpp">class Buffer {
    std::vector&lt;char&gt; data_;
public:
    std::vector&lt;char&gt;  get() &amp;&amp;  { return std::move(data_); }  // called on rvalues: steal
    const std::vector&lt;char&gt;&amp; get() const &amp;  { return data_; } // called on lvalues: observe
};
Buffer{}.get();    // ⟶ &amp;&amp; overload (rvalue) → moves out
Buffer b; b.get(); // ⟶ const&amp; overload (lvalue) → returns reference
</code></pre>
<pre><code>   ref-qualifiers restrict member functions by the value category of the object:
     f() &amp;   → callable only on lvalues
     f() &amp;&amp;  → callable only on rvalues
   Powerful for: &quot;steal from a temporary&quot; and forbidding assignment to temporaries.
   You may NOT mix ref-qualified and non-ref-qualified overloads of the same name.
</code></pre>
<h3 id="noexcept-specification"><code>noexcept</code> specification</h3>
<pre><code class="language-cpp">void swap(T&amp;) noexcept;                 // promise: never throws
void f() noexcept(sizeof(int) == 4);    // conditional
</code></pre>
<h3 id="virtual-override-final-pure--0"><code>virtual</code>, <code>override</code>, <code>final</code>, pure (<code>= 0</code>)</h3>
<pre><code class="language-cpp">struct Base {
    virtual void f();              // overridable
    virtual void g() = 0;          // pure virtual ⇒ Base is abstract
    virtual ~Base() = default;
};
struct D : Base {
    void f() override;             // checked override (error if signature mismatches)
    void g() override final;       // override AND forbid further overriding
};
struct DD final : D { };           // DD cannot be derived from
</code></pre>
<pre><code>   virtual   → dynamic dispatch (vtable, Module 07)
   = 0       → pure virtual; class becomes abstract (can't instantiate)
   override  → compiler verifies it actually overrides a base virtual (USE ALWAYS)
   final     → on a function: no further override; on a class: no derivation
   A pure virtual may still have a DEFINITION (called via Base::g()).
</code></pre>
<h3 id="static-member-functions"><code>static</code> member functions</h3>
<pre><code class="language-cpp">class Math { public: static int add(int a, int b){ return a+b; } };
Math::add(2,3);    // no object, no 'this'
</code></pre>
<h3 id="-default--delete-trailing-return-type"><code>= default</code>, <code>= delete</code>, trailing return type</h3>
<pre><code class="language-cpp">T(const T&amp;) = default;
T(const T&amp;) = delete;
auto compute() const -&gt; double;     // trailing return type
</code></pre>
<h3 id="c23-explicit-object-parameter-deducing-this">C++23: explicit object parameter (&ldquo;deducing this&rdquo;)</h3>
<pre><code class="language-cpp">struct Widget {
    template&lt;class Self&gt;
    auto&amp;&amp; value(this Self&amp;&amp; self) {        // 'this' becomes a real, deducible parameter
        return std::forward&lt;Self&gt;(self).v_; // ONE function handles const/non-const/&amp;/&amp;&amp;!
    }
    int v_;
};
</code></pre>
<pre><code>   C++23 'deducing this' lets you write ONE member template instead of 4 overloads
   (const&amp;, &amp;, const&amp;&amp;, &amp;&amp;). 'self' carries the cv/ref qualification of the object.
   Also enables recursive lambdas and CRTP-free mixins.
</code></pre>
<hr />
<h2 id="59-special-member-functions--generation-rules">5.9 Special member functions &amp; generation rules</h2>
<p>The compiler can synthesize <strong>six</strong> special members:</p>
<pre><code>   T();                          default constructor
   ~T();                         destructor
   T(const T&amp;);                  copy constructor
   T&amp; operator=(const T&amp;);       copy assignment
   T(T&amp;&amp;) noexcept;              move constructor   (C++11)
   T&amp; operator=(T&amp;&amp;) noexcept;   move assignment    (C++11)
</code></pre>
<p>Generation rules (the table every expert memorizes):</p>
<table>

<tr>
<th>You declare&hellip;</th>
<th style="text-align: center;">default ctor</th>
<th style="text-align: center;">dtor</th>
<th style="text-align: center;">copy ctor</th>
<th style="text-align: center;">copy =</th>
<th style="text-align: center;">move ctor</th>
<th style="text-align: center;">move =</th>
</tr>
</thead>
<tbody>
<tr>
<td>nothing</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
</tr>
<tr>
<td>any constructor</td>
<td style="text-align: center;">❌</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
</tr>
<tr>
<td><strong>destructor</strong></td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">—</td>
<td style="text-align: center;">⚠️dep</td>
<td style="text-align: center;">⚠️dep</td>
<td style="text-align: center;"><strong>❌</strong></td>
<td style="text-align: center;"><strong>❌</strong></td>
</tr>
<tr>
<td>copy ctor or copy =</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">✅</td>
<td style="text-align: center;">⚠️/—</td>
<td style="text-align: center;">⚠️/—</td>
<td style="text-align: center;"><strong>❌</strong></td>

</tr>

<p><code>⚠️dep</code> = still generated but <strong>deprecated</strong>. <code>❌</code> = not provided. <code>=del</code> = deleted.</p>
<p>🧠 <strong>The deadliest silent pitfall</strong>: declaring a destructor (e.g. for logging)
<strong>suppresses the move operations</strong>, so every &ldquo;move&rdquo; silently becomes a <strong>copy</strong> —
no error, just slow. Cures: Rule of Zero, or explicitly <code>= default</code> the moves.</p>
<p>The mnemonic <strong>&ldquo;Rule of DesDeMovA&rdquo;</strong> / the Rule of Five (full treatment in
<a href="06_copy_move_semantics.md">Module 06</a>):</p>
<pre><code>   RULE OF ZERO : declare none of the six; let members manage resources. ← PREFER.
   RULE OF FIVE : if you manage a raw resource, declare all five
                  (dtor + copy ctor/assign + move ctor/assign), all consistent.
</code></pre>
<hr />
<h2 id="510-static-members">5.10 static members</h2>
<pre><code class="language-cpp">class Counter {
    static inline int count_ = 0;   // C++17 inline static: define + init in-class, ONE instance
    int id_;
public:
    Counter()  : id_(++count_) {}
    ~Counter() { --count_; }
    static int live() { return count_; }     // static member fn: no 'this'
    static constexpr int kMax = 1000;         // static constexpr (implicitly inline)
};
// pre-C++17 required out-of-line definition:  int Counter::count_ = 0;
</code></pre>
<pre><code>   per-object members        static members
   ┌────────┐ ┌────────┐     ┌───────────────────┐
   │ obj1   │ │ obj2   │     │ count_ (ONE copy, │  shared by ALL objects; lives in
   │ id_    │ │ id_    │     │ static storage)   │  static storage, not in any object.
   └────────┘ └────────┘     └───────────────────┘
</code></pre>
<p>🧠 A function-local <code>static</code> (Meyers singleton) is initialized <strong>once, thread-safe</strong>
on first call (C++11) and solves the static-init-order fiasco (Module 02 §2.10).</p>
<hr />
<h2 id="511-friend">5.11 friend</h2>
<p><code>friend</code> grants a function or class access to <code>private</code>/<code>protected</code> members. It is
an explicit <strong>extension</strong> of the interface, not a violation of encapsulation.</p>
<pre><code class="language-cpp">class Matrix {
    double* data_;
    friend Matrix operator*(const Matrix&amp;, const Matrix&amp;);   // free function friend
    friend std::ostream&amp; operator&lt;&lt;(std::ostream&amp;, const Matrix&amp;);
    friend class MatrixView;                                  // friend class
    template&lt;class T&gt; friend class Wrapper;                   // friend template
};
</code></pre>
<pre><code>   • friendship is GRANTED, not taken (declared inside the granting class).
   • NOT transitive (a friend's friend isn't a friend), NOT inherited.
   • A friend declared &amp; defined inline in the class is a non-member with ADL
     visibility (&quot;hidden friend&quot; idiom — great for operators; found only via ADL).
</code></pre>
<p>🧠 <strong>Hidden friends</strong>: defining <code>operator&lt;&lt;</code>/<code>operator==</code> as inline friends inside
the class makes them findable only by argument-dependent lookup, which speeds
compilation and avoids polluting the namespace. Preferred for operators.</p>
<hr />
<h2 id="512-aggregates--aggregate-initialization">5.12 Aggregates &amp; aggregate initialization</h2>
<p>An <strong>aggregate</strong> (C++20 definition) is an array or a class with: no user-declared/
inherited constructors, no private/protected <strong>non-static</strong> data members, no
virtual functions, and no private/protected/virtual bases.</p>
<pre><code class="language-cpp">struct Point3 { int x, y, z; };               // aggregate (no ctors, all public)
Point3 a{1, 2, 3};                            // aggregate init (memberwise, in order)
Point3 b{1};                                  // x=1, y=0, z=0 (rest value-initialized)
Point3 c{.x = 1, .z = 3};                     // designated initializers (C++20); y=0
int arr[]{1, 2, 3};                           // arrays are aggregates too

struct Derived : Point3 { int w; };           // C++17: aggregates may have public bases
Derived d{{1,2,3}, 4};                        // base then member
</code></pre>
<pre><code>   AGGREGATE rules:
   • brace-init writes members in DECLARATION order; missing ones are value-init.
   • designated initializers must be in declaration order, non-repeating (C++20).
   • adding ANY user constructor or a private data member ⇒ no longer an aggregate.
   • aggregates skip constructor machinery entirely (no ctor is called).
</code></pre>
<hr />
<h2 id="513-raii--the-central-idiom">5.13 RAII — the central idiom</h2>
<pre><code class="language-cpp">class Lock {
    std::mutex&amp; m_;
public:
    explicit Lock(std::mutex&amp; m) : m_(m) { m_.lock(); }   // acquire in ctor
    ~Lock() { m_.unlock(); }                              // release in dtor
    Lock(const Lock&amp;) = delete;                           // non-copyable resource
    Lock&amp; operator=(const Lock&amp;) = delete;
};
</code></pre>
<pre><code>   RAII — Resource Acquisition Is Initialization
   ┌─────────────────────────────────────────────────────────────────┐
   │  acquire in CONSTRUCTOR → use → release in DESTRUCTOR.          │
   │  The destructor runs on EVERY scope exit: normal return, break, │
   │  and EXCEPTION unwinding ⇒ no leaks, no manual cleanup, no      │
   │  'finally'. This is THE C++ resource-management idiom.          │
   └─────────────────────────────────────────────────────────────────┘
   {
       Lock g(mtx);     // ctor locks
       work();          // may throw...
   }                    // ~Lock unlocks — GUARANTEED, even on exception
</code></pre>
<p>Every resource — memory, files, sockets, locks, GPU handles — should be owned by
an RAII object. <code>std::unique_ptr</code>, <code>std::lock_guard</code>, <code>std::fstream</code> are RAII
wrappers (Modules 11, 15). <strong>If you write manual cleanup on multiple paths, use
RAII instead.</strong></p>

<h2 id="61-value-categories-lvalue-prvalue-xvalue">6.1 Value categories: lvalue, prvalue, xvalue</h2>
<p>Every expression has a <strong>type</strong> and a <strong>value category</strong>.</p>
<pre><code>                        expression
                       ┌───────────┐
                       │  glvalue  │           rvalue
                  ┌────┴────┐                ┌────┴────┐
               lvalue     xvalue ────────────┘      prvalue
               (has        (expiring: about to       (pure: a temporary,
                identity,    be moved-from)            no identity)
                a name)
</code></pre>
<table>
<thead>
<tr>
<th>Category</th>
<th>Has identity?</th>
<th>Can be moved from?</th>
<th>Examples</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>lvalue</strong></td>
<td>yes</td>
<td>no</td>
<td><code>x</code>, <code>arr[i]</code>, <code>*p</code>, <code>++x</code>, a named variable</td>
</tr>
<tr>
<td><strong>prvalue</strong></td>
<td>no</td>
<td>yes</td>
<td><code>42</code>, <code>a+b</code>, <code>f()</code> returning by value, <code>Widget{}</code></td>
</tr>
<tr>
<td><strong>xvalue</strong></td>
<td>yes</td>
<td>yes</td>
<td><code>std::move(x)</code>, <code>f()</code> returning <code>T&amp;&amp;</code></td>
</tr>
</tbody>
</table>
<pre><code class="language-cpp">int x = 5;
int&amp; lr = x;          // x is an lvalue
int&amp;&amp; rr = 10;        // 10 is a prvalue ⇒ binds to rvalue ref
int&amp;&amp; mr = std::move(x);  // std::move(x) is an xvalue
</code></pre>
<p>🧠 Mnemonic: <strong>lvalue</strong> = &ldquo;locator value&rdquo;, something with a stable address/name.
<strong>rvalue</strong> = &ldquo;right-hand value&rdquo;, a temporary you may steal from. <code>std::move</code>
doesn&rsquo;t move anything — it&rsquo;s a <strong>cast to rvalue reference</strong> that <em>enables</em> a move.</p>
<hr />
<h2 id="62-why-move-matters--the-copy-that-wasnt-needed">6.2 Why move matters — the copy that wasn&rsquo;t needed</h2>
<pre><code class="language-cpp">std::vector&lt;std::string&gt; v;
std::string s = &quot;a very long string................&quot;;
v.push_back(s);             // COPIES s (s is an lvalue, still needed)
v.push_back(std::move(s));  // MOVES from s (we promise we're done with s)
v.push_back(makeString());  // MOVES from the temporary automatically
</code></pre>
<pre><code>   COPY                              MOVE
   ┌──────┐   allocate + copy        ┌──────┐   steal the pointer
   │ src  │──── all N bytes ───▶ dst │ src  │───┐  (O(1), no allocation)
   └──────┘                          └──────┘   ▼
   src unchanged                     src left EMPTY but VALID (e.g. ptr=nullptr)
</code></pre>
<p>A move <strong>transfers ownership</strong> of the internals (pointer, buffer, handle) instead
of duplicating them. For a <code>std::string</code>/<code>vector</code> that&rsquo;s O(1) vs O(n).</p>
<hr />
<h2 id="63-writing-copy-and-move-members--the-rule-of-5">6.3 Writing copy and move members — the Rule of 5</h2>
<p>Recall <code>IntBuffer</code> from Module 05. Here it is, done correctly:</p>
<pre><code class="language-cpp">class IntBuffer {
    int*        data_ = nullptr;
    std::size_t size_ = 0;
public:
    IntBuffer() = default;
    explicit IntBuffer(std::size_t n) : data_(new int[n]{}), size_(n) {}

    // 1. destructor
    ~IntBuffer() { delete[] data_; }

    // 2. copy constructor — DEEP copy
    IntBuffer(const IntBuffer&amp; o) : data_(new int[o.size_]), size_(o.size_) {
        std::copy(o.data_, o.data_ + size_, data_);
    }

    // 3. copy assignment — copy-and-swap (strong exception safety)
    IntBuffer&amp; operator=(const IntBuffer&amp; o) {
        IntBuffer tmp(o);     // copy
        swap(tmp);            // swap our guts with the copy
        return *this;         // tmp (our old guts) is destroyed here
    }

    // 4. move constructor — STEAL, leave source empty-but-valid; noexcept!
    IntBuffer(IntBuffer&amp;&amp; o) noexcept
        : data_(o.data_), size_(o.size_) {
        o.data_ = nullptr;    // ← critical: source must be safely destructible
        o.size_ = 0;
    }

    // 5. move assignment
    IntBuffer&amp; operator=(IntBuffer&amp;&amp; o) noexcept {
        IntBuffer tmp(std::move(o));
        swap(tmp);
        return *this;
    }

    void swap(IntBuffer&amp; o) noexcept {
        std::swap(data_, o.data_);
        std::swap(size_, o.size_);
    }
};
</code></pre>
<pre><code>   THE RULE OF FIVE
   If you write ANY of:  destructor, copy ctor, copy assign,
                         move ctor, move assign
   you probably need ALL FIVE (resource ownership is involved).
</code></pre>
<p>⚠️ <strong>Self-assignment</strong> (<code>x = x</code>) and <strong>self-move</strong> must not corrupt the object.
The copy-and-swap idiom above handles self-assignment automatically (it copies
first). A naive <code>delete[] data_; data_ = new...; copy...;</code> breaks on self-assign.</p>
<hr />
<h2 id="64-the-rule-of-zero-what-you-should-aim-for-">6.4 The Rule of Zero (what you should aim for) 🧠</h2>
<pre><code>   THE RULE OF ZERO
   Design classes that need NONE of the five. Let members (std::string,
   std::vector, std::unique_ptr) manage resources. The compiler-generated
   copy/move/destroy then &quot;just work&quot; by composing the members'.
</code></pre>
<pre><code class="language-cpp">class Document {                 // Rule of Zero — no SMFs needed!
    std::string            title_;
    std::vector&lt;std::string&gt; lines_;
    std::unique_ptr&lt;Index&gt; index_;   // moves correctly, copy is auto-deleted
    // compiler generates correct dtor, move ctor/assign; copy is deleted because
    // unique_ptr is move-only. Nothing to write. Nothing to leak.
};
</code></pre>
<p>This is the <em>preferred</em> modern style. Reserve the Rule of 5 for the rare
low-level class that genuinely owns a raw resource (and even then, prefer wrapping
it in a tiny RAII handle).</p>
<hr />
<h2 id="65-when-the-compiler-generates--suppresses-smfs">6.5 When the compiler generates / suppresses SMFs</h2>
<pre><code>   You declare...          compiler still gives you...
   ─────────────────────────────────────────────────────────────────
   nothing                 all 5 (+ default ctor)
   a destructor            copy ops (DEPRECATED), but NO move ops ⚠️
   a copy ctor/assign      NO move ops; other copy op deprecated-generated
   a move ctor/assign      copy ops are DELETED
   = default for one       requests that specific one
   = delete for one        forbids it (and may affect overload resolution)
</code></pre>
<p>🧠 <strong>The deadliest silent pitfall</strong>: add a destructor (e.g. for logging) to a
class that holds a <code>vector</code>, and the compiler <strong>stops generating move operations</strong>.
Every &ldquo;move&rdquo; silently becomes a <strong>copy</strong> → massive performance regression with no
error. Cure: follow Rule of 0, or explicitly <code>=default</code> the moves.</p>
<pre><code class="language-cpp">class Slow {
    std::vector&lt;int&gt; data_;
public:
    ~Slow() { log(&quot;destroyed&quot;); }   // ⚠️ this killed move semantics!
    // Fix: also add
    Slow(Slow&amp;&amp;) = default;
    Slow&amp; operator=(Slow&amp;&amp;) = default;
    Slow(const Slow&amp;) = default;
    Slow&amp; operator=(const Slow&amp;) = default;
};
</code></pre>
<hr />
<h2 id="66-noexcept-on-move-operations--not-optional-">6.6 <code>noexcept</code> on move operations — not optional 🧠</h2>
<pre><code class="language-cpp">IntBuffer(IntBuffer&amp;&amp;) noexcept;   // ← the noexcept matters A LOT
</code></pre>
<p><code>std::vector</code> reallocation uses moves <strong>only if the move constructor is
<code>noexcept</code></strong>; otherwise it falls back to <em>copies</em> to preserve the strong exception
guarantee.</p>
<pre><code>   vector grows; must relocate elements:
   move ctor is noexcept  →  MOVE each element  (fast, O(1) per element)
   move ctor may throw    →  COPY each element  (slow, O(n) per element) ⚠️
</code></pre>
<p><code>std::move_if_noexcept</code> encodes this rule. <strong>Always mark your move ops <code>noexcept</code>.</strong></p>
<hr />
<h2 id="67-forwarding-references--stdforward-preview-of-module-0912">6.7 Forwarding references &amp; <code>std::forward</code> (preview of Module 09/12)</h2>
<pre><code class="language-cpp">template&lt;class T&gt;
void wrapper(T&amp;&amp; arg) {                 // T&amp;&amp; here is a FORWARDING (universal) reference
    callee(std::forward&lt;T&gt;(arg));        // preserves lvalue/rvalue-ness of arg
}
</code></pre>
<pre><code>   T&amp;&amp; in a deduced template context is a FORWARDING reference (not an rvalue ref):
     wrapper(x);         T deduced as int&amp; , arg type int&amp;   → forwards as lvalue
     wrapper(make());    T deduced as int  , arg type int&amp;&amp;  → forwards as rvalue
   std::forward&lt;T&gt; casts back to the ORIGINAL category. std::move ALWAYS casts to rvalue.
</code></pre>
<p>🧠 Use <code>std::move</code> when you have a concrete rvalue ref / are done with a named
object; use <code>std::forward&lt;T&gt;</code> <strong>only</strong> in templates with <code>T&amp;&amp;</code> forwarding refs.</p>
<hr />
<h2 id="68-copy-elision-rvo--nrvo">6.8 Copy elision, RVO &amp; NRVO</h2>
<pre><code class="language-cpp">IntBuffer make() {
    return IntBuffer(100);   // prvalue — NO copy, NO move: constructed directly in caller
}
IntBuffer b = make();        // guaranteed elision (C++17): zero copies/moves
</code></pre>
<pre><code>   RVO (Return Value Optimization): a returned temporary is constructed
   DIRECTLY in the caller's storage — the copy/move is ELIDED.
   • C++17 makes elision MANDATORY for returning prvalues.
   • NRVO (named return) is allowed but NOT guaranteed:
        IntBuffer f(){ IntBuffer x(100); return x; }  // usually elided, not required
</code></pre>
<p>⚠️ Don&rsquo;t write <code>return std::move(x);</code> to &ldquo;help&rdquo; — it <strong>disables</strong> NRVO and forces
a move. Just <code>return x;</code>. (<code>std::move</code> on return is only needed for returning a
<em>member</em> or by some non-prvalue paths.)</p>
<hr />
<h2 id="69-the-empty-but-valid-invariant-">6.9 The empty-but-valid invariant 🧠</h2>
<p>After a move, the source object must be in a <strong>valid but unspecified</strong> state: you
may destroy it or assign to it, but you shouldn&rsquo;t assume its value.</p>
<pre><code class="language-cpp">std::string s = &quot;hello&quot;;
std::string t = std::move(s);
// s is valid: you may do s.clear(), s = &quot;new&quot;, s.size() (some value).
// You may NOT assume s == &quot;hello&quot; or s.empty(). Don't read its value blindly.
</code></pre>
<hr />
<h2 id="610-checklist">6.10 Checklist</h2>
<ul>
<li class="task-list-item"><input type="checkbox" disabled> You can classify any expression as lvalue / prvalue / xvalue.</li>
<li class="task-list-item"><input type="checkbox" disabled> You know <code>std::move</code> is a cast, not a move; <code>std::forward</code> preserves category.</li>
<li class="task-list-item"><input type="checkbox" disabled> You default to the Rule of 0; you implement Rule of 5 with copy-and-swap when needed.</li>
<li class="task-list-item"><input type="checkbox" disabled> You always mark move operations <code>noexcept</code> and know why vector needs it.</li>
<li class="task-list-item"><input type="checkbox" disabled> You don&rsquo;t <code>return std::move(local)</code>; you rely on (N)RVO.</li>
<li class="task-list-item"><input type="checkbox" disabled> You know that declaring a destructor silently disables move generation.</li>
</ul>

<blockquote>
<p>Inheritance models &ldquo;is-a&rdquo; relationships and enables <strong>runtime polymorphism</strong> via
virtual functions. The implementation (vtables, vptrs) is not magic — once you
see the layout, slicing, the non-virtual-destructor bug, and the cost of virtual
calls all become obvious. <code>[Primer §15]</code></p>
</blockquote>
<hr />
<h2 id="71-basic-inheritance">7.1 Basic inheritance</h2>
<pre><code class="language-cpp">class Animal {
public:
    explicit Animal(std::string name) : name_(std::move(name)) {}
    const std::string&amp; name() const { return name_; }
    void breathe() const { /* shared behavior */ }
protected:
    std::string name_;     // accessible to derived classes
};

class Dog : public Animal {     // Dog IS-A Animal
public:
    explicit Dog(std::string n) : Animal(std::move(n)) {}  // must init base
    void bark() const { /* Dog-specific */ }
};
</code></pre>
<pre><code>   OBJECT LAYOUT of a Dog
   ┌───────────────────────────────┐
   │  Animal subobject             │ ← base part comes first
   │    name_ : std::string        │
   ├───────────────────────────────┤
   │  Dog-specific members         │
   └───────────────────────────────┘
   A Dog* can be used as an Animal* because the Animal part is at offset 0.
</code></pre>
<h3 id="public--protected--private-inheritance">public / protected / private inheritance</h3>
<pre><code>   class D : public  B   → &quot;is-a&quot;      (public of B stays public)    ← 99% of the time
   class D : protected B → &quot;implemented-in-terms-of&quot; (public→protected)
   class D : private B   → &quot;implemented-in-terms-of&quot; (public→private) ← prefer COMPOSITION instead
</code></pre>
<p>🧠 Use <strong>public inheritance only for true &ldquo;is-a&rdquo;</strong> with the Liskov Substitution
Principle (a <code>D</code> must be usable wherever a <code>B</code> is). For &ldquo;has-a&rdquo;/&rdquo;uses-a&rdquo;, prefer
<strong>composition</strong> (a member) over private inheritance.</p>
<hr />
<h2 id="72-virtual-functions--dynamic-dispatch">7.2 Virtual functions &amp; dynamic dispatch</h2>
<pre><code class="language-cpp">class Shape {
public:
    virtual double area() const = 0;     // PURE virtual ⇒ Shape is ABSTRACT
    virtual void   draw() const { /*default*/ }
    virtual ~Shape() = default;          // ⚠️ virtual dtor — see 7.5
};

class Circle : public Shape {
    double r_;
public:
    explicit Circle(double r) : r_(r) {}
    double area() const override { return 3.14159265 * r_ * r_; }  // override!
    void   draw() const override { /* draw circle */ }
};
</code></pre>
<pre><code class="language-cpp">std::unique_ptr&lt;Shape&gt; s = std::make_unique&lt;Circle&gt;(2.0);
s-&gt;area();   // calls Circle::area() — resolved at RUNTIME via the vtable
</code></pre>
<pre><code>   STATIC dispatch (non-virtual): decided at compile time by the STATIC type
   DYNAMIC dispatch (virtual):    decided at run time by the DYNAMIC type
</code></pre>
<p>⚠️ Always write <code>override</code>. It makes the compiler verify you actually override a
base virtual (catches typos, const mismatches, signature drift). Use <code>final</code> to
forbid further overriding/derivation.</p>
<pre><code class="language-cpp">double area() const override;   // error if no matching base virtual exists
class Circle final : public Shape { ... };   // no one may derive from Circle
void draw() const final;        // no one may override draw further
</code></pre>
<hr />
<h2 id="73-how-it-works-vtable--vptr-">7.3 How it works: vtable &amp; vptr 🧠</h2>
<pre><code>   Each polymorphic CLASS has ONE vtable (array of function pointers).
   Each polymorphic OBJECT has a hidden vptr pointing to its class's vtable.

   Circle c;
   ┌──────────────────┐        ┌──────── Circle vtable ─────────┐
   │ vptr ────────────┼───────▶│ [0] &amp;Circle::area              │
   │ Shape members... │        │ [1] &amp;Circle::draw              │
   │ r_ = 2.0         │        │ [2] &amp;Circle::~Circle           │
   └──────────────────┘        └────────────────────────────────┘

   s-&gt;area()  compiles to roughly:
       (*(s-&gt;vptr[0]))(s)        // index fixed at compile time; target chosen at run time
</code></pre>
<p>Cost of a virtual call:</p>
<ul>
<li>One extra indirection (load vptr → load slot → indirect call).</li>
<li>
<p>Usually <strong>not inlinable</strong> (target unknown at compile time) → this is often the
  bigger cost than the indirection itself.</p>
</li>
<li>
<p>One pointer (<code>vptr</code>) of space per object; one vtable per class.</p>
</li>
</ul>
<p>🧠 Devirtualization: if the compiler can prove the dynamic type (e.g. <code>Circle c;
c.area();</code> on a concrete object, or with <code>final</code>), it can call directly and inline.
<code>final</code> is a real optimization hint, not just documentation.</p>
<hr />
<h2 id="74-object-slicing--a-silent-value-semantics-trap-">7.4 Object slicing — a silent value-semantics trap ⚠️</h2>
<pre><code class="language-cpp">void render(Shape s);          // ⚠️ by VALUE — takes a Shape, not a Circle
Circle c(2.0);
render(c);                     // SLICES: only the Shape part is copied; area() is wrong
</code></pre>
<pre><code>   Circle c                    copied BY VALUE into a Shape parameter
   ┌──────────────┐            ┌──────────────┐
   │ Shape part   │ ──copy──▶  │ Shape part   │   ← only this survives
   │ r_ = 2.0     │   ✂        └──────────────┘   ← r_ is SLICED OFF; vptr is Shape's
   └──────────────┘
</code></pre>
<p>🧠 <strong>Polymorphism only works through pointers or references</strong>, never by value.
Pass <code>const Shape&amp;</code> or <code>Shape*</code> (or a smart pointer). Storing polymorphic objects
in a <code>std::vector&lt;Shape&gt;</code> slices them — store <code>std::vector&lt;std::unique_ptr&lt;Shape&gt;&gt;</code>.</p>
<hr />
<h2 id="75-the-non-virtual-destructor-bug-">7.5 The non-virtual destructor bug ⚠️</h2>
<pre><code class="language-cpp">class Base { public: ~Base(){} };          // ⚠️ NON-virtual destructor
class Derived : public Base { Big data_; };
Base* p = new Derived;
delete p;                                  // ⚠️ UB: only ~Base runs, ~Derived skipped → leak
</code></pre>
<pre><code>   RULE: If a class is meant to be deleted through a base pointer,
         its destructor MUST be virtual.
   Guideline (Core Guidelines C.35): a base class destructor should be
   either PUBLIC + VIRTUAL, or PROTECTED + NON-virtual.
</code></pre>
<pre><code class="language-cpp">class Base { public: virtual ~Base() = default; };   // ✅ deletes through Base* correctly
</code></pre>
<hr />
<h2 id="76-calling-base-versions--name-hiding">7.6 Calling base versions &amp; name hiding</h2>
<pre><code class="language-cpp">class D : public B {
public:
    void f() override {
        B::f();          // explicitly call the base version
        /* extra */
    }
};
</code></pre>
<p>⚠️ <strong>Name hiding</strong>: a derived declaration of a name hides <em>all</em> base overloads of
that name, even with different signatures:</p>
<pre><code class="language-cpp">struct B { void g(int); void g(double); };
struct D : B { void g(int); };   // hides BOTH B::g — D{}.g(3.14) calls D::g(int)!
struct D2: B { using B::g; void g(int); };  // ✅ 'using' un-hides the base overloads
</code></pre>
<hr />
<h2 id="77-abstract-classes--interfaces">7.7 Abstract classes &amp; interfaces</h2>
<pre><code class="language-cpp">class Drawable {                       // a pure interface
public:
    virtual void draw() const = 0;     // pure virtual
    virtual ~Drawable() = default;
};
// Cannot instantiate Drawable directly; must derive and implement draw().
</code></pre>
<p>C++ has no <code>interface</code> keyword — an interface is just an abstract class with only
pure virtuals (and a virtual dtor). A pure virtual <em>may</em> still have a body
(<code>void Drawable::draw() const {}</code>) to provide a callable default via <code>Base::draw()</code>.</p>
<hr />
<h2 id="78-multiple-inheritance--the-diamond">7.8 Multiple inheritance &amp; the diamond</h2>
<pre><code class="language-cpp">struct A { int a; };
struct B : A {};
struct C : A {};
struct D : B, C {};      // ⚠️ D has TWO A subobjects (one via B, one via C)
</code></pre>
<pre><code>   THE DIAMOND PROBLEM
        A           Without 'virtual': D contains B::A and C::A — d.a is AMBIGUOUS.
       / \\
      B   C         With virtual inheritance: ONE shared A.
       \\ /
        D

   struct B : virtual A {};
   struct C : virtual A {};
   struct D : B, C {};      // ✅ exactly one A subobject; d.a is unambiguous
</code></pre>
<p>🧠 Virtual inheritance has costs (extra pointers/offsets to find the shared base,
trickier construction — the <em>most derived</em> class initializes the virtual base).
Most designs avoid it; the common, clean use is <strong>multiple interface inheritance</strong>
(several abstract bases with no data).</p>
<hr />
<h2 id="79-rtti-dynamic_cast--typeid">7.9 RTTI: <code>dynamic_cast</code> &amp; <code>typeid</code></h2>
<pre><code class="language-cpp">Shape* s = getShape();
if (auto* c = dynamic_cast&lt;Circle*&gt;(s)) {   // returns nullptr if not a Circle
    use(c-&gt;radius());
}
Shape&amp; r = *s;
try { auto&amp; c = dynamic_cast&lt;Circle&amp;&gt;(r); } // throws std::bad_cast on failure (refs)
catch (const std::bad_cast&amp;) { }

#include &lt;typeinfo&gt;
if (typeid(*s) == typeid(Circle)) { ... }   // exact dynamic type query
</code></pre>
<pre><code>   dynamic_cast&lt;Derived*&gt;(basePtr)   needs a POLYMORPHIC type (&gt;=1 virtual fn)
     success → Derived*    failure → nullptr (pointers) / throws (references)
</code></pre>
<p>🧠 Frequent <code>dynamic_cast</code> in hot paths is a design smell — prefer a virtual
function that does the type-specific work. RTTI also has a (small) runtime cost
and can be disabled with <code>-fno-rtti</code>.</p>
<hr />
<h2 id="710-static-compile-time-polymorphism-preview-crtp">7.10 Static (compile-time) polymorphism preview: CRTP</h2>
<p>Runtime polymorphism (virtual) has indirection cost. <strong>CRTP</strong> (Module 09) gives
polymorphism resolved at compile time, zero overhead:</p>
<pre><code class="language-cpp">template&lt;class Derived&gt;
struct Shape {
    double area() const { return static_cast&lt;const Derived&amp;&gt;(*this).area_impl(); }
};
struct Circle : Shape&lt;Circle&gt; {
    double r_;
    double area_impl() const { return 3.14159 * r_ * r_; }  // no vtable, inlinable
};
</code></pre>
<hr />

<li class="task-list-item"><input type="checkbox" disabled> You use public inheritance only for genuine &ldquo;is-a&rdquo; (LSP); else compose.</li>
<li class="task-list-item"><input type="checkbox" disabled> You always write <code>override</code>; you use <code>final</code> where appropriate.</li>
<li class="task-list-item"><input type="checkbox" disabled> You can draw the vtable/vptr diagram and explain virtual-call cost.</li>

<li class="task-list-item"><input type="checkbox" disabled> You never pass polymorphic objects by value (slicing).</li>
<li class="task-list-item"><input type="checkbox" disabled> You understand the diamond and when virtual inheritance is warranted.</li>
</ul>

<td><a href="#88-comparison-operators--and-c20-rewrites">8.8</a></td>
</tr>
<tr>
<td>Logical</td>
<td><code>&amp;&amp; \\|\\|</code></td>
<td><strong>avoid</strong></td>
<td><a href="#89-logical--and-comma--avoid">8.9</a></td>
</tr>
<tr>
<td>Comma</td>
<td><code>,</code></td>
<td><strong>avoid</strong></td>
<td><a href="#89-logical--and-comma--avoid">8.9</a></td>
</tr>
<tr>
<td>Subscript</td>
<td><code>[]</code></td>

<td><a href="#810-subscript-">8.10</a></td>
</tr>
<tr>
<td>Function call</td>

<td><a href="#811-function-call-">8.11</a></td>
</tr>
<tr>
<td>Member access</td>
<td><code>-&gt; -&gt;*</code></td>
<td><code>-&gt;</code> must be member</td>
<td><a href="#812-member-access----and-">8.12</a></td>
</tr>
<tr>
<td>Dereference / address</td>
<td><code>*</code> <code>&amp;</code> (unary)</td>
<td>member (idiom)</td>
<td><a href="#813-dereference--and-address-of--unary">8.13</a></td>
</tr>
<tr>

<td><a href="#814-conversion-operators">8.14</a></td>
